<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pi4 Audio Workstation – PoC</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#121212;color:#e0e0e0;font-family:'Courier New',monospace;font-size:13px;overflow-x:hidden}
h1{font-size:16px;padding:8px 12px;background:#1e1e1e;border-bottom:1px solid #333}
#spectrograph{display:block;width:100%;height:360px;background:#000}
#meters{display:flex;gap:2px;padding:8px 12px;height:180px;align-items:flex-end;background:#1a1a1a;border-top:1px solid #333}
.meter-col{display:flex;flex-direction:column;align-items:center;flex:1;height:100%}
.meter-bar-wrap{position:relative;flex:1;width:100%;min-width:18px;max-width:36px;background:#222;border:1px solid #333;overflow:hidden}
.meter-fill{position:absolute;bottom:0;left:0;right:0;transition:height 60ms linear}
.meter-peak{position:absolute;left:0;right:0;height:2px;background:#fff;transition:bottom 60ms linear}
.meter-label{font-size:10px;margin-top:3px;text-align:center;white-space:nowrap}
.group-label{font-size:10px;color:#888;text-align:center;padding:2px 6px;background:#1e1e1e;border-radius:2px;margin-bottom:2px}
.meter-group{display:flex;flex-direction:column;align-items:center}
.meter-group-inner{display:flex;gap:2px;height:150px}
.meter-group+.meter-group{margin-left:10px}
#diag{padding:6px 12px;font-size:11px;color:#888;background:#1a1a1a;border-top:1px solid #333;display:flex;gap:18px;flex-wrap:wrap}
#diag span{white-space:nowrap}
.ok{color:#4caf50}.warn{color:#ff9800}.err{color:#f44336}
</style>
</head>
<body>
<h1>Pi4 Audio Workstation – PoC</h1>
<canvas id="spectrograph"></canvas>
<div id="meters"></div>
<div id="diag">
  <span>PCM WS: <b id="d-pcm-state" class="warn">connecting</b></span>
  <span>Levels WS: <b id="d-lvl-state" class="warn">connecting</b></span>
  <span>PCM frames: <b id="d-pcm-frames">0</b></span>
  <span>FPS: <b id="d-fps">0</b></span>
  <span>Levels polls: <b id="d-lvl-polls">0</b></span>
  <span>Drops: <b id="d-drops">0</b></span>
</div>

<script>
// =========================================================================
// AudioWorklet processor (inline via Blob URL)
// =========================================================================
const workletCode = `
class PcmFeeder extends AudioWorkletProcessor {
  constructor() {
    super();
    this.buf = [];       // queue of Float32Array chunks (interleaved 3ch)
    this.offset = 0;     // read offset into buf[0]
    this.channels = 3;
    this.maxQueue = 32;  // cap queue to prevent unbounded growth when suspended
    this.port.onmessage = (e) => {
      this.buf.push(e.data);
      // Drop oldest chunks if queue grows too large (e.g. AudioContext was suspended)
      while (this.buf.length > this.maxQueue) { this.buf.shift(); this.offset = 0; }
    };
  }
  process(inputs, outputs) {
    const out = outputs[0];
    const frames = out[0].length;  // 128
    let written = 0;
    while (written < frames && this.buf.length > 0) {
      const src = this.buf[0];
      const srcFrames = src.length / this.channels;
      const avail = srcFrames - this.offset;
      const take = Math.min(avail, frames - written);
      for (let ch = 0; ch < this.channels; ch++) {
        const outCh = out[ch] || out[0];  // fallback if fewer output channels
        for (let i = 0; i < take; i++) {
          outCh[written + i] = src[(this.offset + i) * this.channels + ch];
        }
      }
      written += take;
      this.offset += take;
      if (this.offset >= srcFrames) { this.buf.shift(); this.offset = 0; }
    }
    // silence remainder
    for (let ch = 0; ch < this.channels; ch++) {
      const outCh = out[ch] || out[0];
      for (let i = written; i < frames; i++) outCh[i] = 0;
    }
    return true;
  }
}
registerProcessor('pcm-feeder', PcmFeeder);
`;

// =========================================================================
// Globals
// =========================================================================
const NUM_CH = 3;
const CH_LABELS = ['L Main', 'R Main', 'Sub Sum'];
const SAMPLE_RATE = 48000;
const QUANTUM = 256;

let pcmFrames = 0, fpsCount = 0, fpsDisplay = 0, lvlPolls = 0, drops = 0;
let pcmWsState = 'connecting', lvlWsState = 'connecting';

// Diag elements
const dPcmState = document.getElementById('d-pcm-state');
const dLvlState = document.getElementById('d-lvl-state');
const dPcmFrames = document.getElementById('d-pcm-frames');
const dFps = document.getElementById('d-fps');
const dLvlPolls = document.getElementById('d-lvl-polls');
const dDrops = document.getElementById('d-drops');

function setWsIndicator(el, state) {
  el.textContent = state;
  el.className = state === 'open' ? 'ok' : state === 'connecting' ? 'warn' : 'err';
}

// FPS counter – update every second
setInterval(() => { fpsDisplay = fpsCount; fpsCount = 0; }, 1000);

// =========================================================================
// Canvas setup
// =========================================================================
const canvas = document.getElementById('spectrograph');
const ctx = canvas.getContext('2d');
let W, H, chH;

function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  W = canvas.width = rect.width * devicePixelRatio | 0;
  H = canvas.height = rect.height * devicePixelRatio | 0;
  chH = (H / NUM_CH) | 0;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// Log-frequency mapping: 20 Hz – 20 kHz
const FREQ_LO = 20, FREQ_HI = 20000;
const LOG_LO = Math.log10(FREQ_LO), LOG_HI = Math.log10(FREQ_HI);

function freqBinForY(y, fftSize) {
  // y=0 => FREQ_HI (top), y=chH-1 => FREQ_LO (bottom)
  const logF = LOG_HI - (y / (chH - 1)) * (LOG_HI - LOG_LO);
  const freq = Math.pow(10, logF);
  return Math.round(freq * fftSize / SAMPLE_RATE);
}

// Pre-compute bin lookup (one per pixel row within a channel strip)
let binLookup = [];
function buildBinLookup(fftSize) {
  binLookup = new Array(chH);
  for (let y = 0; y < chH; y++) binLookup[y] = Math.min(freqBinForY(y, fftSize), fftSize / 2 - 1);
}

// Color LUT: 0-255 -> blue(quiet) -> yellow(loud) -> red(clip)
const colorLUT = new Uint8Array(256 * 3);
for (let i = 0; i < 256; i++) {
  let r, g, b;
  if (i < 128) {
    // blue -> yellow
    const t = i / 127;
    r = (t * 255) | 0;
    g = (t * 200) | 0;
    b = ((1 - t) * 255) | 0;
  } else {
    // yellow -> red
    const t = (i - 128) / 127;
    r = 255;
    g = ((1 - t) * 200) | 0;
    b = 0;
  }
  colorLUT[i * 3] = r;
  colorLUT[i * 3 + 1] = g;
  colorLUT[i * 3 + 2] = b;
}

// =========================================================================
// Audio pipeline
// =========================================================================
let audioCtx, workletNode, analysers = [];
let freqDataArrays = [];

async function initAudio() {
  audioCtx = new AudioContext({ sampleRate: SAMPLE_RATE });

  // Register worklet from Blob URL
  const blob = new Blob([workletCode], { type: 'application/javascript' });
  const url = URL.createObjectURL(blob);
  await audioCtx.audioWorklet.addModule(url);
  URL.revokeObjectURL(url);

  workletNode = new AudioWorkletNode(audioCtx, 'pcm-feeder', {
    numberOfInputs: 0,
    numberOfOutputs: 1,
    outputChannelCount: [NUM_CH],
  });

  // Create a channel splitter -> 3 AnalyserNodes
  const splitter = audioCtx.createChannelSplitter(NUM_CH);
  workletNode.connect(splitter);

  for (let ch = 0; ch < NUM_CH; ch++) {
    const analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.8;
    splitter.connect(analyser, ch);
    analysers.push(analyser);
    freqDataArrays.push(new Uint8Array(analyser.frequencyBinCount));
  }

  buildBinLookup(analysers[0].fftSize);

  // Connect to destination to keep graph alive (muted — we don't actually
  // want to hear it in the browser; but AnalyserNode needs the graph ticking).
  const gain = audioCtx.createGain();
  gain.gain.value = 0;
  workletNode.connect(gain);
  gain.connect(audioCtx.destination);
}

// =========================================================================
// PCM WebSocket
// =========================================================================
function connectPcm() {
  const ws = new WebSocket(`ws://${location.host}/ws/pcm`);
  ws.binaryType = 'arraybuffer';
  ws.onopen = () => { pcmWsState = 'open'; };
  ws.onclose = () => { pcmWsState = 'closed'; setTimeout(connectPcm, 2000); };
  ws.onerror = () => { pcmWsState = 'error'; };
  ws.onmessage = (ev) => {
    const data = ev.data;
    if (data.byteLength < 4) return;
    const header = new DataView(data, 0, 4);
    const frameCount = header.getUint32(0, true);
    pcmFrames += frameCount;
    const pcm = new Float32Array(data, 4);
    if (workletNode) workletNode.port.postMessage(pcm, [pcm.buffer]);
  };
}

// =========================================================================
// Spectrograph rendering
// =========================================================================
function drawSpectrograph() {
  fpsCount++;

  // Shift existing image left by 1 column
  const imgData = ctx.getImageData(1, 0, W - 1, H);
  ctx.putImageData(imgData, 0, 0);

  // Draw new column at right edge
  for (let ch = 0; ch < NUM_CH; ch++) {
    analysers[ch].getByteFrequencyData(freqDataArrays[ch]);
    const freq = freqDataArrays[ch];
    const yOff = ch * chH;
    for (let y = 0; y < chH; y++) {
      const bin = binLookup[y];
      const val = freq[bin];
      const ci = val * 3;
      ctx.fillStyle = `rgb(${colorLUT[ci]},${colorLUT[ci + 1]},${colorLUT[ci + 2]})`;
      ctx.fillRect(W - 1, yOff + y, 1, 1);
    }
  }

  // Update diagnostics
  setWsIndicator(dPcmState, pcmWsState);
  setWsIndicator(dLvlState, lvlWsState);
  dPcmFrames.textContent = pcmFrames;
  dFps.textContent = fpsDisplay;
  dLvlPolls.textContent = lvlPolls;
  dDrops.textContent = drops;

  requestAnimationFrame(drawSpectrograph);
}

// =========================================================================
// Level meters
// =========================================================================
// CamillaDSP 8-channel layout:
//   Capture:  0=InL, 1=InR
//   Playback: 0=ML,  1=MR,  2=S1,  3=S2,  4=EL,  5=ER,  6=IL,  7=IR
const METER_GROUPS = [
  { label: 'CAPTURE', color: '#00BCD4', ids: ['In L', 'In R'], src: 'capture', indices: [0, 1] },
  { label: 'PA SENDS', color: null, ids: ['ML', 'MR', 'S1', 'S2'], src: 'playback', indices: [0, 1, 2, 3] },
  { label: 'MON SENDS', color: null, ids: ['EL', 'ER', 'IL', 'IR'], src: 'playback', indices: [4, 5, 6, 7] },
];

const meterEls = [];  // {fill, peak, peakVal, peakTime}

function buildMeters() {
  const container = document.getElementById('meters');
  container.innerHTML = '';
  for (const grp of METER_GROUPS) {
    const gDiv = document.createElement('div');
    gDiv.className = 'meter-group';
    const lbl = document.createElement('div');
    lbl.className = 'group-label';
    lbl.textContent = grp.label;
    gDiv.appendChild(lbl);
    const inner = document.createElement('div');
    inner.className = 'meter-group-inner';
    for (let i = 0; i < grp.ids.length; i++) {
      const col = document.createElement('div');
      col.className = 'meter-col';
      const wrap = document.createElement('div');
      wrap.className = 'meter-bar-wrap';
      const fill = document.createElement('div');
      fill.className = 'meter-fill';
      const peak = document.createElement('div');
      peak.className = 'meter-peak';
      wrap.appendChild(fill);
      wrap.appendChild(peak);
      col.appendChild(wrap);
      const mLbl = document.createElement('div');
      mLbl.className = 'meter-label';
      mLbl.textContent = grp.ids[i];
      col.appendChild(mLbl);
      inner.appendChild(col);
      meterEls.push({ fill, peak, peakVal: -96, peakTime: 0, grpColor: grp.color });
    }
    gDiv.appendChild(inner);
    container.appendChild(gDiv);
  }
}

function dbToHeight(db) {
  // -96 dB -> 0%, 0 dB -> 100%
  return Math.max(0, Math.min(100, ((db + 96) / 96) * 100));
}

function dbColor(db) {
  if (db > -3) return '#f44336';
  if (db > -12) return '#ff9800';
  return '#4caf50';
}

function updateMeters(data) {
  let idx = 0;
  const now = performance.now();
  for (const grp of METER_GROUPS) {
    const rmsKey = grp.src + '_rms';
    const peakKey = grp.src + '_peak';
    const rms = data[rmsKey] || [];
    const peaks = data[peakKey] || [];
    for (let i = 0; i < grp.indices.length; i++) {
      const si = grp.indices[i];
      const el = meterEls[idx++];
      const db = rms[si] !== undefined ? rms[si] : -96;
      const pk = peaks[si] !== undefined ? peaks[si] : -96;
      const h = dbToHeight(db);
      const color = el.grpColor || dbColor(db);
      el.fill.style.height = h + '%';
      el.fill.style.background = color;

      // Peak hold with 2-second decay
      if (pk > el.peakVal || now - el.peakTime > 2000) {
        el.peakVal = pk;
        el.peakTime = now;
      }
      el.peak.style.bottom = dbToHeight(el.peakVal) + '%';
    }
  }
}

// =========================================================================
// Levels WebSocket
// =========================================================================
function connectLevels() {
  const ws = new WebSocket(`ws://${location.host}/ws/levels`);
  ws.onopen = () => { lvlWsState = 'open'; };
  ws.onclose = () => { lvlWsState = 'closed'; setTimeout(connectLevels, 2000); };
  ws.onerror = () => { lvlWsState = 'error'; };
  ws.onmessage = (ev) => {
    lvlPolls++;
    try { updateMeters(JSON.parse(ev.data)); } catch (e) { /* ignore parse errors */ }
  };
}

// =========================================================================
// Boot
// =========================================================================
async function boot() {
  buildMeters();
  connectLevels();  // levels don't need AudioContext — start immediately

  // Defer audio init until user gesture (AudioContext requires it)
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:9999;cursor:pointer';
  overlay.innerHTML = '<div style="color:#fff;font-size:24px;text-align:center">Click to start audio<br><span style="font-size:14px;color:#aaa">Browser requires user gesture for AudioContext</span></div>';
  document.body.appendChild(overlay);

  overlay.addEventListener('click', async () => {
    overlay.remove();
    await initAudio();
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    connectPcm();
    requestAnimationFrame(drawSpectrograph);
  }, { once: true });
}
boot();
</script>
</body>
</html>
