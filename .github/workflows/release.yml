# Release Pipeline for mugge
#
# Builds the aarch64 SD card image and creates a GitHub release with
# the compressed image as a downloadable artifact.
#
# Triggers:
#   Tag push matching v* (e.g., v2026.04.05, v0.1.0)
#   Manual workflow_dispatch on any branch
#
# The SD image build is identical to CI T3 — same runner, same Nix
# expression, same Cachix cache.  The release step adds artifact
# upload and checksum generation.
#
# IMPORTANT: Tags MUST only be pushed to commits that have passing CI
# (T0+T1+T2+T3 green on the PR that merged the commit).  This workflow
# does NOT re-run tests — it trusts that CI already validated the
# tagged commit.  Pushing a tag to an untested commit will produce an
# image from unverified code.  The verify-ci job below is a safety net
# that checks the commit's CI status, but the primary gate is the PR
# merge process (Rule 13 + CI green).

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # -----------------------------------------------------------
  # Pre-flight: verify the tagged commit has passing CI
  # Fast check via GitHub API — fails the release if CI never
  # ran or failed on this commit.  Only runs for tag pushes.
  # -----------------------------------------------------------
  verify-ci:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check CI status on tagged commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sha="${{ github.sha }}"
          echo "Checking CI status for commit $sha"

          # Query combined commit status + check runs
          state=$(gh api "repos/${{ github.repository }}/commits/$sha/status" \
            --jq '.state')
          echo "Combined commit status: $state"

          if [ "$state" = "failure" ] || [ "$state" = "error" ]; then
            echo "::error::Tagged commit $sha has failing CI status: $state"
            echo "Tags must only be pushed to commits with passing CI."
            exit 1
          fi

          if [ "$state" = "pending" ]; then
            echo "::warning::CI status is pending for $sha — CI may not have completed yet."
            echo "Proceeding, but verify CI passed before distributing the image."
          fi

          echo "CI status: $state"

  # -----------------------------------------------------------
  # Build SD image and create release / upload artifact
  # -----------------------------------------------------------
  build-and-release:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 180
    needs: [verify-ci]
    if: ${{ !cancelled() && (needs.verify-ci.result == 'success' || needs.verify-ci.result == 'skipped') }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - uses: cachix/cachix-action@v17
        with:
          name: mugge
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build aarch64 SD card image
        run: cachix watch-exec mugge -- nix build .#images.sd-card --print-build-logs

      - name: Prepare release artifacts
        id: artifacts
        run: |
          mapfile -t images < <(find result/ -name '*.img.zst' 2>/dev/null)

          if [ "${#images[@]}" -eq 0 ]; then
            # Fall back to uncompressed .img
            mapfile -t images < <(find result/ -name '*.img' 2>/dev/null)
          fi

          if [ "${#images[@]}" -eq 0 ]; then
            echo "::error::No image file found in result/"
            ls -lhR result/
            exit 1
          fi

          if [ "${#images[@]}" -gt 1 ]; then
            echo "::error::Expected exactly one image file, found ${#images[@]}:"
            printf '  %s\n' "${images[@]}"
            exit 1
          fi

          img="${images[0]}"
          filename=$(basename "$img")
          size=$(du -h "$img" | cut -f1)
          sha256=$(sha256sum "$img" | cut -d' ' -f1)
          tag="${GITHUB_REF_NAME:-manual-$(date +%Y%m%d-%H%M%S)}"
          sha="${GITHUB_SHA:0:7}"

          echo "img=$img" >> "$GITHUB_OUTPUT"
          echo "filename=$filename" >> "$GITHUB_OUTPUT"
          echo "size=$size" >> "$GITHUB_OUTPUT"
          echo "sha256=$sha256" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

          echo "Image: $filename ($size)"
          echo "SHA-256: $sha256"

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.artifacts.outputs.img }}
          fail_on_unmatched_files: true
          generate_release_notes: true
          body: |
            ## SD Card Image

            | Field | Value |
            |-------|-------|
            | Image | `${{ steps.artifacts.outputs.filename }}` |
            | Compressed size | ${{ steps.artifacts.outputs.size }} |
            | SHA-256 | `${{ steps.artifacts.outputs.sha256 }}` |
            | Tag | `${{ steps.artifacts.outputs.tag }}` |
            | Commit | `${{ steps.artifacts.outputs.sha }}` |

            ### Flash to SD card

            ```bash
            zstd -d ${{ steps.artifacts.outputs.filename }} -o mugge.img
            sudo dd if=mugge.img of=/dev/sdX bs=4M status=progress
            ```

      - name: Upload image as workflow artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: sd-card-image
          path: ${{ steps.artifacts.outputs.img }}
          retention-days: 7
