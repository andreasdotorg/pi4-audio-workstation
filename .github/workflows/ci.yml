# CI Pipeline for mugge
#
# Jobs:
#   T0  — NixOS config validation (nix eval, fast, catches Nix syntax/option errors)
#   T1  — Unit + Rust + browser tests (single job, sequential suites)
#   T2  — E2E tests (full local-demo PipeWire stack, Linux-only, x86_64)
#   T3  — aarch64 SD card image build (proves the full NixOS closure builds)
#
# Dependency graph (fully serial):
#   T0 → T1 → T2 → T3
#
# Triggers:
#   push to any branch   — T0 → T1
#   push to main          — T0 → T1 → T2 → T3
#   PR targeting main     — T0 → T1 → T2 → T3
#   workflow_dispatch      — T2 and/or T3 on any branch (manual)
#
# Flaky test policy: If a test is flaky, fix it or skip it with a filed
# defect (@pytest.mark.skip with defect ID). Do not add retry logic.
# A flaky test is a bug, not an inconvenience. CI failure on a flaky test
# blocks the PR until the test is fixed or properly quarantined.

name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_e2e:
        description: 'Run E2E tests (T2)'
        type: boolean
        default: true
      run_sd_image:
        description: 'Build aarch64 SD card image (T3)'
        type: boolean
        default: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------
  # T0 — NixOS configuration validation
  # Fast check that the NixOS config evaluates without errors.
  # Catches option renames, type mismatches, missing modules.
  # Uses QEMU user-mode to evaluate aarch64 Nix expressions.
  # Gates the rest of the pipeline — T1 depends on T0.
  # -----------------------------------------------------------
  nixos-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install QEMU user-mode for aarch64
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-user-static binfmt-support

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            extra-platforms = aarch64-linux

      - uses: cachix/cachix-action@v17
        with:
          name: mugge
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Evaluate NixOS configuration
        run: |
          drv=$(nix eval .#nixosConfigurations.mugge.config.system.build.toplevel.drvPath)
          echo "NixOS toplevel derivation: $drv"

  # -----------------------------------------------------------
  # T1 — All tests (unit + Rust + browser)
  # Single job: one Nix/Cachix setup, then run each test suite
  # sequentially. Shared Nix store means later suites reuse deps.
  # -----------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [nixos-eval]
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - uses: cachix/cachix-action@v17
        with:
          name: mugge
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Run unit + Rust tests
        run: nix run .#test-all

      - name: Run pcm-bridge tests
        run: nix run .#test-pcm-bridge

      - name: Run signal-gen tests
        run: nix run .#test-signal-gen

      - name: Run browser integration tests
        run: nix run .#test-integration-browser

  # -----------------------------------------------------------
  # T2 — E2E tests (full local-demo PipeWire stack)
  # Starts headless PipeWire + GM + signal-gen + pcm-bridge +
  # level-bridge + web-ui, runs Playwright E2E suite.
  # Runs on: push to main, PRs targeting main, or manual dispatch.
  # -----------------------------------------------------------
  test-e2e:
    if: >-
      github.ref == 'refs/heads/main'
      || github.event_name == 'pull_request'
      || (github.event_name == 'workflow_dispatch' && inputs.run_e2e)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [test]
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - uses: cachix/cachix-action@v17
        with:
          name: mugge
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Run E2E tests with local-demo stack
        env:
          E2E_STACK_TIMEOUT: '60'
        run: nix run .#test-e2e

  # -----------------------------------------------------------
  # T3 — aarch64 SD card image build
  # Builds the full NixOS SD image for Raspberry Pi 4B.
  # Proves the entire closure (kernel, PipeWire, services) builds.
  # Runs on: push to main, PRs targeting main, or manual dispatch.
  # Uses native aarch64 runner — no QEMU overhead for full build.
  # -----------------------------------------------------------
  build-sd-image:
    if: >-
      github.ref == 'refs/heads/main'
      || github.event_name == 'pull_request'
      || (github.event_name == 'workflow_dispatch' && inputs.run_sd_image)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    needs: [test-e2e]
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - uses: cachix/cachix-action@v17
        with:
          name: mugge
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build aarch64 SD card image
        run: nix build .#images.sd-card --print-build-logs

      - name: Report image size
        run: |
          img=$(find result/ -name '*.img.zst' -o -name '*.img' 2>/dev/null | head -1)
          if [ -n "$img" ]; then
            echo "SD image: $img ($(du -h "$img" | cut -f1))"
          else
            echo "SD image built successfully"
            ls -lh result/
          fi
