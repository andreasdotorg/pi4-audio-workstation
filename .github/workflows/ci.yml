# CI Pipeline for mugge
#
# Jobs (4 jobs):
#   changes        — Detect which paths changed (docs-only vs code)
#   nixos-eval     — NixOS config validation (nix eval, x86_64, fast, always runs)
#   test-and-build — All tests (aarch64, skipped for docs-only PRs)
#   ci-gate        — Final status gate (always runs, required by branch protection)
#
# Pipeline:
#   changes ─┬─> nixos-eval ─┬─> test-and-build (if code changed) ─┬─> ci-gate
#            └────────────────┘                                      │
#                             └──────────────────────────────────────┘
#
# Steps within test-and-build:
#   T1  — Unit + Rust + browser tests
#   T2  — E2E tests
#
# T3 (SD card image build) removed from PR CI. Moved to separate
# tag-triggered release workflow.
#
# Triggers:
#   PR targeting main     — changes → nixos-eval → test-and-build (if code) → ci-gate
#   workflow_dispatch      — T1 and/or T2 on any branch (manual, always runs tests)
#
# Docs-only PRs (only docs/**, *.md, .claude/**, CLAUDE.md changed):
#   nixos-eval runs (cheap, catches config errors), test-and-build is skipped,
#   ci-gate passes. This allows docs-only PRs to merge without ARM runner time.
#
# No push trigger — CI runs on PRs only.  Workers run T0+T1 locally
# before every push (see docs/guide/howto/development.md).  This avoids
# wasting CI minutes on feature-branch pushes and prevents double runs
# when a PR is open (push + pull_request would both fire).
#
# Flaky test policy: If a test is flaky, fix it or skip it with a filed
# defect (@pytest.mark.skip with defect ID). Do not add retry logic.
# A flaky test is a bug, not an inconvenience. CI failure on a flaky test
# blocks the PR until the test is fixed or properly quarantined.

name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_e2e:
        description: 'Run E2E tests (T2)'
        type: boolean
        default: true

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------
  # Path change detection
  # Determines whether code paths changed (requiring tests) or
  # only docs/config paths changed (tests can be skipped).
  # -----------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'nix/**'
              - 'configs/**'
              - 'scripts/**'
              - 'flake.nix'
              - 'flake.lock'
              - '.github/**'
              - 'tests/**'

  # -----------------------------------------------------------
  # T0 — NixOS configuration validation
  # Fast check that the NixOS config evaluates without errors.
  # Catches option renames, type mismatches, missing modules.
  # Uses QEMU user-mode to evaluate aarch64 Nix expressions.
  # Always runs — even for docs-only PRs.
  # -----------------------------------------------------------
  nixos-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install QEMU user-mode for aarch64
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-user-static binfmt-support

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            extra-platforms = aarch64-linux

      - uses: cachix/cachix-action@v17
        with:
          name: mugge
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Evaluate NixOS configuration
        run: |
          drv=$(nix eval .#nixosConfigurations.mugge.config.system.build.toplevel.drvPath)
          echo "NixOS toplevel derivation: $drv"

  # -----------------------------------------------------------
  # T1 + T2 — Tests (single ARM runner)
  # One Nix/Cachix setup, shared Nix store across all steps.
  # Skipped for docs-only PRs. Always runs on workflow_dispatch.
  # -----------------------------------------------------------
  test-and-build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 180
    needs: [changes, nixos-eval]
    if: >-
      needs.changes.outputs.code == 'true'
      || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - uses: cachix/cachix-action@v17
        with:
          name: mugge
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      # -- T1: Unit + Rust + browser tests (every PR) -------------

      - name: Run unit + Rust tests
        run: cachix watch-exec mugge -- nix run .#test-all

      - name: Run pcm-bridge tests
        run: cachix watch-exec mugge -- nix run .#test-pcm-bridge

      - name: Run signal-gen tests
        run: cachix watch-exec mugge -- nix run .#test-signal-gen

      - name: Run level-bridge tests
        run: cachix watch-exec mugge -- nix run .#test-level-bridge

      - name: Run browser integration tests
        run: cachix watch-exec mugge -- nix run .#test-integration-browser

      # -- T2: E2E tests (PRs + manual dispatch) ------------------

      - name: Run E2E tests with local-demo stack
        if: >-
          github.event_name == 'pull_request'
          || (github.event_name == 'workflow_dispatch' && inputs.run_e2e)
        env:
          E2E_STACK_TIMEOUT: '60'
        run: cachix watch-exec mugge -- nix run .#test-e2e

  # -----------------------------------------------------------
  # CI Gate — Final merge-readiness check
  # Always runs. Required by branch protection instead of
  # test-and-build (which may be skipped for docs-only PRs).
  # Fails if any upstream job failed.
  # -----------------------------------------------------------
  ci-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    needs: [nixos-eval, test-and-build]
    steps:
      - name: Check job results
        run: |
          echo "nixos-eval: ${{ needs.nixos-eval.result }}"
          echo "test-and-build: ${{ needs.test-and-build.result }}"

          if [[ "${{ needs.nixos-eval.result }}" != "success" ]]; then
            echo "FAIL: nixos-eval did not succeed"
            exit 1
          fi

          # test-and-build is "skipped" only when changes.outputs.code == 'false'
          # (docs-only PR). In that case nixos-eval (checked above) is the sole
          # quality gate. Any other non-success state (failure, cancelled) is a
          # real problem and must block the merge.
          if [[ "${{ needs.test-and-build.result }}" != "success" \
             && "${{ needs.test-and-build.result }}" != "skipped" ]]; then
            echo "FAIL: test-and-build did not succeed or skip cleanly"
            exit 1
          fi

          echo "All checks passed"
