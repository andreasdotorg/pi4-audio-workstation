# CI Pipeline for mugge (US-070, D-044)
#
# Two parallel jobs on GitHub-hosted ubuntu-latest runners with Nix:
#   test-all                  — unit, integration, room-correction, graph-manager, pcm-bridge, signal-gen
#   test-integration-browser  — Playwright browser tests (separated for parallel execution)
#
# Flaky test policy: If a test is flaky, fix it or skip it with a filed
# defect (@pytest.mark.skip with defect ID). Do not add retry logic.
# A flaky test is a bug, not an inconvenience. CI failure on a flaky test
# blocks the PR until the test is fixed or properly quarantined.

name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-all:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-

      - name: Run all unit and integration tests
        run: nix run .#test-all

      - name: Run graph-manager tests
        run: nix run .#test-graph-manager

      - name: Run pcm-bridge tests
        run: nix run .#test-pcm-bridge

      - name: Run signal-gen tests
        run: nix run .#test-signal-gen

  test-integration-browser:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-

      - name: Run browser integration tests
        run: nix run .#test-integration-browser
