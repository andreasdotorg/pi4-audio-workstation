# CI Pipeline for mugge
#
# Jobs (2 jobs, single ARM runner for tests + build):
#   nixos-eval     — NixOS config validation (nix eval, x86_64, fast)
#   test-and-build — All tests + SD image build (aarch64, one Nix store)
#
# Pipeline:
#   nixos-eval → test-and-build
#
# Steps within test-and-build:
#   T1  — Unit + Rust + browser tests
#   T2  — E2E tests
#   T3  — aarch64 SD card image build
#
# Triggers:
#   PR targeting main     — nixos-eval → T1 → T2 → T3
#   workflow_dispatch      — T2 and/or T3 on any branch (manual)
#
# No push trigger — CI runs on PRs only.  Workers run T0+T1 locally
# before every push (see docs/guide/howto/development.md).  This avoids
# wasting CI minutes on feature-branch pushes and prevents double runs
# when a PR is open (push + pull_request would both fire).
#
# Flaky test policy: If a test is flaky, fix it or skip it with a filed
# defect (@pytest.mark.skip with defect ID). Do not add retry logic.
# A flaky test is a bug, not an inconvenience. CI failure on a flaky test
# blocks the PR until the test is fixed or properly quarantined.

name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_e2e:
        description: 'Run E2E tests (T2)'
        type: boolean
        default: true
      run_sd_image:
        description: 'Build aarch64 SD card image (T3)'
        type: boolean
        default: true

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------
  # T0 — NixOS configuration validation
  # Fast check that the NixOS config evaluates without errors.
  # Catches option renames, type mismatches, missing modules.
  # Uses QEMU user-mode to evaluate aarch64 Nix expressions.
  # Gates test-and-build.
  # -----------------------------------------------------------
  nixos-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install QEMU user-mode for aarch64
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-user-static binfmt-support

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            extra-platforms = aarch64-linux

      - uses: cachix/cachix-action@v17
        with:
          name: mugge
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Evaluate NixOS configuration
        run: |
          drv=$(nix eval .#nixosConfigurations.mugge.config.system.build.toplevel.drvPath)
          echo "NixOS toplevel derivation: $drv"

  # -----------------------------------------------------------
  # T1 + T2 + T3 — Tests and SD image build (single ARM runner)
  # One Nix/Cachix setup, shared Nix store across all steps.
  # All steps run on PRs. T2/T3 gated on manual dispatch inputs.
  # -----------------------------------------------------------
  test-and-build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 180
    needs: [nixos-eval]
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - uses: cachix/cachix-action@v17
        with:
          name: mugge
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      # -- T1: Unit + Rust + browser tests (every PR) -------------

      - name: Run unit + Rust tests
        run: cachix watch-exec mugge -- nix run .#test-all

      - name: Run pcm-bridge tests
        run: cachix watch-exec mugge -- nix run .#test-pcm-bridge

      - name: Run signal-gen tests
        run: cachix watch-exec mugge -- nix run .#test-signal-gen

      - name: Run browser integration tests
        run: cachix watch-exec mugge -- nix run .#test-integration-browser

      # -- T2: E2E tests (PRs + manual dispatch) ------------------

      - name: Run E2E tests with local-demo stack
        if: >-
          github.event_name == 'pull_request'
          || (github.event_name == 'workflow_dispatch' && inputs.run_e2e)
        env:
          E2E_STACK_TIMEOUT: '60'
        run: cachix watch-exec mugge -- nix run .#test-e2e

      # -- T3: aarch64 SD card image build (PRs + manual dispatch) -

      - name: Build aarch64 SD card image
        if: >-
          github.event_name == 'pull_request'
          || (github.event_name == 'workflow_dispatch' && inputs.run_sd_image)
        run: cachix watch-exec mugge -- nix build .#images.sd-card --print-build-logs

      - name: Report image size
        if: >-
          github.event_name == 'pull_request'
          || (github.event_name == 'workflow_dispatch' && inputs.run_sd_image)
        run: |
          img=$(find result/ -name '*.img.zst' -o -name '*.img' 2>/dev/null | head -1)
          if [ -n "$img" ]; then
            echo "SD image: $img ($(du -h "$img" | cut -f1))"
          else
            echo "SD image built successfully"
            ls -lh result/
          fi
