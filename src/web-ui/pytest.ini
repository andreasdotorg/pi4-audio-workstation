[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    browser: tests requiring a Playwright browser
    slow: tests that take >10s (real DSP computation)
    e2e: real-stack end-to-end test
    service_integration: real-stack service test (no browser)
    destructive: tests that modify Pi state
    needs_usb_audio: requires USB audio device (UMIK-1 loopback)
    needs_pw: requires PipeWire running
    needs_acoustic: requires physical speakers (owner-confirmed)
    audio_producing: produces audio output (owner-confirmed)
