# PipeWire filter-chain FIR convolution benchmark (BM-2, US-058).
#
# 4 convolvers with 16,384-tap Dirac impulse filters at 48 kHz,
# matching the CamillaDSP speaker pipeline (left_hp, right_hp,
# sub1_lp, sub2_lp) for a fair comparison to US-001 / BM-1 baselines.
#
# Audio graph:
#   [4ch capture sink] -> 4x convolver -> [4ch playback source]
#
# The capture side is an Audio/Sink node that receives 4 channels.
# Each channel passes through a separate convolver.  The playback
# side exposes 4 channels for downstream routing (or null sink).
#
# Usage:
#   1. Generate Dirac WAVs:  python3 gen_dirac_bm2.py /tmp/bm2-coeffs
#   2. Load this config:     see run_bm2.sh
#
# Placeholders are substituted by run_bm2.sh:
#   @COEFF_DIR@  -- directory containing dirac_16384.wav

context.modules = [
{
  name = libpipewire-module-filter-chain
  args = {
    node.description = "BM-2 FIR Benchmark (4ch x 16k taps)"
    media.name        = "BM-2 FIR Benchmark"
    filter.graph = {
      nodes = [
        { type = builtin  name = conv_left_hp   label = convolver  config = { filename = "@COEFF_DIR@/dirac_16384.wav" } }
        { type = builtin  name = conv_right_hp  label = convolver  config = { filename = "@COEFF_DIR@/dirac_16384.wav" } }
        { type = builtin  name = conv_sub1_lp   label = convolver  config = { filename = "@COEFF_DIR@/dirac_16384.wav" } }
        { type = builtin  name = conv_sub2_lp   label = convolver  config = { filename = "@COEFF_DIR@/dirac_16384.wav" } }
      ]
      links = [
      ]
      inputs  = [ "conv_left_hp:In" "conv_right_hp:In" "conv_sub1_lp:In" "conv_sub2_lp:In" ]
      outputs = [ "conv_left_hp:Out" "conv_right_hp:Out" "conv_sub1_lp:Out" "conv_sub2_lp:Out" ]
    }
    capture.props = {
      node.name   = "bm2-fir-benchmark-capture"
      media.class = Audio/Sink
      audio.channels = 4
      audio.position = [ FL FR RL RR ]
    }
    playback.props = {
      node.name    = "bm2-fir-benchmark-playback"
      node.passive = true
      audio.channels = 4
      audio.position = [ FL FR RL RR ]
    }
  }
}
]
