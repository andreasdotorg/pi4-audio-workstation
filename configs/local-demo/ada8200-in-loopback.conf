# ADA8200 ADC capture loopback for local-demo (US-111 T-111-05).
#
# Replaces the null-audio-sink adapter for ada8200-in with a PipeWire loopback
# module that is self-activating (no WirePlumber needed for port activation).
# The loopback echoes audio from its sink input to its source output.
#
# The playback (source) node uses the production name "ada8200-in" so
# GraphManager's routing table matches: Exact("ada8200-in").
#
# GM routes two paths from this node:
#   - Live mode: ada8200-in:capture_AUX{0..7} -> REAPER:in{1..8} (8 links)
#   - Level-bridge: ada8200-in:capture_AUX{0..7} -> level-bridge-hw-in (8 links)
#
# Production ada8200-in uses Audio/Source (not Audio/Duplex). This loopback
# matches production more closely than the previous null-audio-sink adapter.
#
# On production Pi (real ADA8200 hardware), this node does not exist.
# The real ADA8200 ADAT input is renamed to "ada8200-in" by WirePlumber.
#
# Injected by local-demo.sh into the PW config directory.

context.modules = [
{
    name = libpipewire-module-loopback
    args = {
        node.description = "ADA8200 ADC Loopback (local-demo)"

        capture.props = {
            node.name                      = "ada8200-in-loopback-sink"
            node.description               = "ADA8200 Loopback Sink (local-demo)"
            media.class                    = Audio/Sink
            audio.channels                 = 8
            audio.rate                     = 48000
            audio.position                 = [ AUX0 AUX1 AUX2 AUX3 AUX4 AUX5 AUX6 AUX7 ]
            node.autoconnect               = false
            node.always-process            = true
            session.suspend-timeout-seconds = 0
            node.pause-on-idle             = false
        }

        playback.props = {
            node.name                      = "ada8200-in"
            node.description               = "ADA8200 ADC Capture (local-demo)"
            media.class                    = Audio/Source
            audio.channels                 = 8
            audio.rate                     = 48000
            audio.position                 = [ AUX0 AUX1 AUX2 AUX3 AUX4 AUX5 AUX6 AUX7 ]
            node.autoconnect               = false
            node.always-process            = true
            session.suspend-timeout-seconds = 0
            node.pause-on-idle             = false
            # F-163: Clear link-group so GM-created links and pw-link/pw-record
            # can connect to this source externally. The loopback module auto-sets
            # node.link-group to prevent feedback, but this blocks external links.
            node.link-group                = ""
            node.group                     = ""
        }
    }
}
]
