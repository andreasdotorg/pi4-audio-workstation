# PipeWire filter-chain convolver for local demo — mirrors production structure.
#
# Identical to the production 30-filter-chain-convolver.conf:
#   - Coefficient paths point to COEFFS_DIR/ (same as production)
#   - D-063 universal audio gate: ALL Mult = 0.0 (muted at startup)
#   - node.description includes "(local demo)" for easy identification
#
# Structure: 8 convolver builtins + 8 linear gain nodes, same as production.
# Channels 0-3 use combined crossover+correction FIR coefficients.
# Channels 4-7 use dirac.wav (identity passthrough).
# Coefficients are generated by the measurement pipeline (speaker channels)
# or shipped as build-time artifacts (dirac.wav for HP/IEM).
#
# Channel assignment (same as production):
#   AUX0 = Left wideband main  (highpass + room correction)
#   AUX1 = Right wideband main (highpass + room correction)
#   AUX2 = Subwoofer 1         (lowpass + room correction)
#   AUX3 = Subwoofer 2         (lowpass + room correction)
#   AUX4 = Engineer headphone L (Dirac passthrough)
#   AUX5 = Engineer headphone R (Dirac passthrough)
#   AUX6 = Singer IEM L         (Dirac passthrough)
#   AUX7 = Singer IEM R         (Dirac passthrough)

context.modules = [
{
    name = libpipewire-module-filter-chain
    args = {
        node.description = "FIR Convolver (8ch, local demo)"
        media.name       = "pi4audio FIR Convolver"

        filter.graph = {
            nodes = [
                # Speaker channels (0-3): crossover + room correction FIR
                {
                    type   = builtin
                    name   = conv_left_hp
                    label  = convolver
                    config = {
                        filename = "COEFFS_DIR/combined_left_hp.wav"
                    }
                }
                {
                    type   = builtin
                    name   = conv_right_hp
                    label  = convolver
                    config = {
                        filename = "COEFFS_DIR/combined_right_hp.wav"
                    }
                }
                {
                    type   = builtin
                    name   = conv_sub1_lp
                    label  = convolver
                    config = {
                        filename = "COEFFS_DIR/combined_sub1_lp.wav"
                    }
                }
                {
                    type   = builtin
                    name   = conv_sub2_lp
                    label  = convolver
                    config = {
                        filename = "COEFFS_DIR/combined_sub2_lp.wav"
                    }
                }
                # Monitoring channels (4-7): Dirac passthrough (identity)
                {
                    type   = builtin
                    name   = conv_hp_l
                    label  = convolver
                    config = {
                        filename = "COEFFS_DIR/dirac.wav"
                    }
                }
                {
                    type   = builtin
                    name   = conv_hp_r
                    label  = convolver
                    config = {
                        filename = "COEFFS_DIR/dirac.wav"
                    }
                }
                {
                    type   = builtin
                    name   = conv_iem_l
                    label  = convolver
                    config = {
                        filename = "COEFFS_DIR/dirac.wav"
                    }
                }
                {
                    type   = builtin
                    name   = conv_iem_r
                    label  = convolver
                    config = {
                        filename = "COEFFS_DIR/dirac.wav"
                    }
                }
                # Linear gain nodes — D-063 universal audio gate.
                # ALL Mult = 0.0 (muted at startup). Operational gains
                # set at runtime via pw-cli ramp-up sequence.
                {
                    type    = builtin
                    name    = gain_left_hp
                    label   = linear
                    control = { "Mult" = 0.0 "Add" = 0.0 }
                }
                {
                    type    = builtin
                    name    = gain_right_hp
                    label   = linear
                    control = { "Mult" = 0.0 "Add" = 0.0 }
                }
                {
                    type    = builtin
                    name    = gain_sub1_lp
                    label   = linear
                    control = { "Mult" = 0.0 "Add" = 0.0 }
                }
                {
                    type    = builtin
                    name    = gain_sub2_lp
                    label   = linear
                    control = { "Mult" = 0.0 "Add" = 0.0 }
                }
                {
                    type    = builtin
                    name    = gain_hp_l
                    label   = linear
                    control = { "Mult" = 0.0 "Add" = 0.0 }
                }
                {
                    type    = builtin
                    name    = gain_hp_r
                    label   = linear
                    control = { "Mult" = 0.0 "Add" = 0.0 }
                }
                {
                    type    = builtin
                    name    = gain_iem_l
                    label   = linear
                    control = { "Mult" = 0.0 "Add" = 0.0 }
                }
                {
                    type    = builtin
                    name    = gain_iem_r
                    label   = linear
                    control = { "Mult" = 0.0 "Add" = 0.0 }
                }
            ]

            links = [
                { output = "conv_left_hp:Out"  input = "gain_left_hp:In" }
                { output = "conv_right_hp:Out" input = "gain_right_hp:In" }
                { output = "conv_sub1_lp:Out"  input = "gain_sub1_lp:In" }
                { output = "conv_sub2_lp:Out"  input = "gain_sub2_lp:In" }
                { output = "conv_hp_l:Out"     input = "gain_hp_l:In" }
                { output = "conv_hp_r:Out"     input = "gain_hp_r:In" }
                { output = "conv_iem_l:Out"    input = "gain_iem_l:In" }
                { output = "conv_iem_r:Out"    input = "gain_iem_r:In" }
            ]

            inputs  = [
                "conv_left_hp:In"
                "conv_right_hp:In"
                "conv_sub1_lp:In"
                "conv_sub2_lp:In"
                "conv_hp_l:In"
                "conv_hp_r:In"
                "conv_iem_l:In"
                "conv_iem_r:In"
            ]
            outputs = [
                "gain_left_hp:Out"
                "gain_right_hp:Out"
                "gain_sub1_lp:Out"
                "gain_sub2_lp:Out"
                "gain_hp_l:Out"
                "gain_hp_r:Out"
                "gain_iem_l:Out"
                "gain_iem_r:Out"
            ]
        }

        capture.props = {
            node.name                       = "pi4audio-convolver"
            node.description                = "FIR Convolver (8ch, local demo)"
            media.class                     = Audio/Sink
            audio.channels                  = 8
            audio.position                  = [ AUX0 AUX1 AUX2 AUX3 AUX4 AUX5 AUX6 AUX7 ]
            node.autoconnect                = false
            session.suspend-timeout-seconds = 0
            node.pause-on-idle              = false
        }

        playback.props = {
            node.name                       = "pi4audio-convolver-out"
            node.description                = "FIR Convolver Output (local demo)"
            node.passive                    = true
            audio.channels                  = 8
            audio.position                  = [ AUX0 AUX1 AUX2 AUX3 AUX4 AUX5 AUX6 AUX7 ]
            node.autoconnect                = false
            session.suspend-timeout-seconds = 0
            node.pause-on-idle              = false
        }
    }
}
]
