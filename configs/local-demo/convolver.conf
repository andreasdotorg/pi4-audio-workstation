# PipeWire filter-chain convolver for local demo — mirrors production structure.
#
# Identical to the production 30-filter-chain-convolver.conf:
#   - Coefficient paths point to COEFFS_DIR/ (same as production)
#   - Gain Mult values match production (0.001 mains, 0.000631 subs)
#   - node.description includes "(local demo)" for easy identification
#
# Structure: 4 convolver builtins + 4 linear gain nodes, same as production.
# Coefficients are generated by the measurement pipeline. If no coefficients
# exist, PipeWire will fail to load this filter-chain — same as production
# on a freshly deployed system before the first measurement session.
#
# Channel assignment (same as production):
#   AUX0 = Left wideband main  (highpass + room correction)
#   AUX1 = Right wideband main (highpass + room correction)
#   AUX2 = Subwoofer 1         (lowpass + room correction)
#   AUX3 = Subwoofer 2         (lowpass + room correction)

context.modules = [
{
    name = libpipewire-module-filter-chain
    args = {
        node.description = "FIR Convolver (4ch, local demo)"
        media.name       = "pi4audio FIR Convolver"

        filter.graph = {
            nodes = [
                {
                    type   = builtin
                    name   = conv_left_hp
                    label  = convolver
                    config = {
                        filename = "COEFFS_DIR/combined_left_hp.wav"
                    }
                }
                {
                    type   = builtin
                    name   = conv_right_hp
                    label  = convolver
                    config = {
                        filename = "COEFFS_DIR/combined_right_hp.wav"
                    }
                }
                {
                    type   = builtin
                    name   = conv_sub1_lp
                    label  = convolver
                    config = {
                        filename = "COEFFS_DIR/combined_sub1_lp.wav"
                    }
                }
                {
                    type   = builtin
                    name   = conv_sub2_lp
                    label  = convolver
                    config = {
                        filename = "COEFFS_DIR/combined_sub2_lp.wav"
                    }
                }
                # Linear gain nodes — same structure as production.
                # Production values: 0.001 (-60 dB) for mains, 0.000631 (-64 dB) for subs.
                # Owner directive: local demo MUST match production gains.
                {
                    type    = builtin
                    name    = gain_left_hp
                    label   = linear
                    control = { "Mult" = 0.001 "Add" = 0.0 }
                }
                {
                    type    = builtin
                    name    = gain_right_hp
                    label   = linear
                    control = { "Mult" = 0.001 "Add" = 0.0 }
                }
                {
                    type    = builtin
                    name    = gain_sub1_lp
                    label   = linear
                    control = { "Mult" = 0.000631 "Add" = 0.0 }
                }
                {
                    type    = builtin
                    name    = gain_sub2_lp
                    label   = linear
                    control = { "Mult" = 0.000631 "Add" = 0.0 }
                }
            ]

            links = [
                { output = "conv_left_hp:Out"  input = "gain_left_hp:In" }
                { output = "conv_right_hp:Out" input = "gain_right_hp:In" }
                { output = "conv_sub1_lp:Out"  input = "gain_sub1_lp:In" }
                { output = "conv_sub2_lp:Out"  input = "gain_sub2_lp:In" }
            ]

            inputs  = [
                "conv_left_hp:In"
                "conv_right_hp:In"
                "conv_sub1_lp:In"
                "conv_sub2_lp:In"
            ]
            outputs = [
                "gain_left_hp:Out"
                "gain_right_hp:Out"
                "gain_sub1_lp:Out"
                "gain_sub2_lp:Out"
            ]
        }

        capture.props = {
            node.name                       = "pi4audio-convolver"
            node.description                = "FIR Convolver (4ch, local demo)"
            media.class                     = Audio/Sink
            audio.channels                  = 4
            audio.position                  = [ AUX0 AUX1 AUX2 AUX3 ]
            node.autoconnect                = false
            session.suspend-timeout-seconds = 0
            node.pause-on-idle              = false
        }

        playback.props = {
            node.name                       = "pi4audio-convolver-out"
            node.description                = "FIR Convolver Output (local demo)"
            node.passive                    = true
            audio.channels                  = 4
            audio.position                  = [ AUX0 AUX1 AUX2 AUX3 ]
            node.autoconnect                = false
            session.suspend-timeout-seconds = 0
            node.pause-on-idle              = false
        }
    }
}
]
