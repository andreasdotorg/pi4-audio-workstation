# UMIK-1 loopback for local-demo measurement E2E testing.
#
# Replaces the null-audio-sink UMIK-1 node with a PipeWire loopback module
# that echoes audio from its sink input to its source output. This allows
# the measurement pipeline to receive real (non-silent) audio when running
# against the local-demo PipeWire environment.
#
# Signal flow in measurement mode:
#   signal-gen → convolver → convolver-out:output_AUX0
#     → (pw-link) umik1-loopback-sink:playback_FL
#     → (loopback internal) alsa_input.usb-miniDSP_Umik-1:capture_FL
#     → (GM link) pi4audio-signal-gen-capture:input_MONO
#     → get_recording() → Python measurement session
#
# The playback (source) node keeps the production name so GraphManager's
# routing table matches: Prefix("alsa_input.usb-miniDSP_Umik-1").
# The capture (sink) node uses a distinct name for the loopback input.
#
# Injected by local-demo.sh into the PW config directory.

context.modules = [
{
    name = libpipewire-module-loopback
    args = {
        node.description = "UMIK-1 Loopback (local-demo)"

        capture.props = {
            node.name                      = "umik1-loopback-sink"
            node.description               = "UMIK-1 Loopback Sink (local-demo)"
            media.class                    = Audio/Sink
            audio.channels                 = 1
            audio.rate                     = 48000
            audio.position                 = [ FL ]
            node.autoconnect               = false
            node.always-process            = true
            session.suspend-timeout-seconds = 0
            node.pause-on-idle             = false
        }

        playback.props = {
            node.name                      = "alsa_input.usb-miniDSP_Umik-1"
            node.description               = "UMIK-1 Loopback Source (local-demo)"
            media.class                    = Audio/Source
            audio.channels                 = 1
            audio.rate                     = 48000
            audio.position                 = [ FL ]
            node.autoconnect               = false
            node.always-process            = true
            session.suspend-timeout-seconds = 0
            node.pause-on-idle             = false
            # F-163: Clear link-group so pw-record can capture from this source.
            # The loopback module auto-sets node.link-group to prevent feedback,
            # but this also blocks pw-link/pw-record from connecting externally.
            # GM-created links work (PW factory API), but pw-record needs this.
            node.link-group                = ""
            node.group                     = ""
        }
    }
}
]
