# Room simulator convolver for local-demo measurement E2E testing.
#
# A mono PipeWire filter-chain convolver that applies a synthetic room
# impulse response between the speaker convolver output and the UMIK-1
# loopback sink. This gives the measurement pipeline a realistic room
# response without any special code paths or env var scaffolding.
#
# Signal flow in measurement mode:
#   signal-gen → pi4audio-convolver → pi4audio-convolver-out
#     → (GM link) pi4audio-room-sim:playback_AUX0
#     → (convolver: room_sim_ir.wav)
#     → pi4audio-room-sim-out:output_AUX0
#     → (GM link) umik1-loopback-sink:playback_FL
#     → (loopback internal) alsa_input.usb-miniDSP_Umik-1:capture_FL
#     → (GM link) signal-gen capture
#
# The room sim FIR is generated by scripts/generate-room-sim-ir.py at
# local-demo startup. It models a small venue (8x6x3m) using the image
# source method with room modes, matching US-067 test fixtures.
#
# On production Pi (real mic, real room), this node does not exist.
# GM's optional links are silently skipped by the reconciler.
#
# Injected by local-demo.sh into the PW config directory.

context.modules = [
{
    name = libpipewire-module-filter-chain
    args = {
        node.description = "Room Simulator (local-demo)"
        media.name       = "pi4audio Room Simulator"

        filter.graph = {
            nodes = [
                {
                    type   = builtin
                    name   = room_conv
                    label  = convolver
                    config = {
                        filename = "COEFFS_DIR/room_sim_ir.wav"
                    }
                }
            ]

            inputs  = [ "room_conv:In" ]
            outputs = [ "room_conv:Out" ]
        }

        capture.props = {
            node.name                      = "pi4audio-room-sim"
            node.description               = "Room Simulator Input (local-demo)"
            media.class                    = Audio/Sink
            audio.channels                 = 1
            audio.position                 = [ AUX0 ]
            node.autoconnect               = false
            node.always-process            = true
            session.suspend-timeout-seconds = 0
            node.pause-on-idle             = false
        }

        playback.props = {
            node.name                      = "pi4audio-room-sim-out"
            node.description               = "Room Simulator Output (local-demo)"
            node.passive                   = true
            audio.channels                 = 1
            audio.position                 = [ AUX0 ]
            node.autoconnect               = false
            session.suspend-timeout-seconds = 0
            node.pause-on-idle             = false
        }
    }
}
]
