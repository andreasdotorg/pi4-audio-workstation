# Room simulator filter-chain for local-demo (US-111 AC #1).
#
# Combined 8-channel filter-chain that replaces the USBStreamer output null-sink.
# The capture side (Audio/Sink) uses the USBStreamer node name so GM's existing
# convolver→USBStreamer links route directly into the room simulator. This
# eliminates the need for separate room-sim hop-1 links.
#
# Channels 0-3 (speakers) are convolved with per-channel room IRs and output
# to the playback side. Channels 4-7 (HP/IEM) are dead-end — they're consumed
# by the sink but not routed to any output (no physical headphones in local-demo).
#
# The playback side outputs 4 convolved speaker channels. GM hop-2 links route
# all 4 to the single UMIK-1 loopback sink port (PW natively sums them).
#
# Signal flow:
#   convolver-out:output_AUX{0-3} → [convolver_to_usbstreamer_links]
#     → capture:playback_AUX{0-3} → room_conv_{left,right,sub1,sub2}
#     → gain_norm_{left,right,sub1,sub2} (Mult=0.25)
#     → playback:output_AUX{0-3} → [hop-2] → umik1-loopback-sink:playback_FL
#
#   Mixxx/Reaper HP/IEM → capture:playback_AUX{4-7} → copy nodes → (discarded)
#
#   level-bridge-hw-out → capture:monitor_AUX{0-7} (Audio/Sink exposes monitor ports)
#
# On production Pi (real USBStreamer hardware), this node does not exist.
# GM's prefix match routes to the real ALSA device instead.
#
# Injected by local-demo.sh into the PW config directory.

context.modules = [
{
    name = libpipewire-module-filter-chain
    args = {
        node.description = "USBStreamer Room Simulator (8ch, local-demo)"
        media.name       = "pi4audio Room Simulator"

        filter.graph = {
            nodes = [
                # Per-channel room IR convolvers (speaker channels 0-3).
                {
                    type   = builtin
                    name   = room_conv_left
                    label  = convolver
                    config = {
                        filename = "COEFFS_DIR/room_ir_left.wav"
                    }
                }
                {
                    type   = builtin
                    name   = room_conv_right
                    label  = convolver
                    config = {
                        filename = "COEFFS_DIR/room_ir_right.wav"
                    }
                }
                {
                    type   = builtin
                    name   = room_conv_sub1
                    label  = convolver
                    config = {
                        filename = "COEFFS_DIR/room_ir_sub1.wav"
                    }
                }
                {
                    type   = builtin
                    name   = room_conv_sub2
                    label  = convolver
                    config = {
                        filename = "COEFFS_DIR/room_ir_sub2.wav"
                    }
                }
                # Per-channel gain normalization (Mult=0.25 = -12 dB).
                # When PW sums all 4 outputs at the loopback sink port,
                # the total level matches the old single-channel sim (~0.2 peak).
                {
                    type    = builtin
                    name    = gain_norm_left
                    label   = linear
                    control = { "Mult" = 0.25 "Add" = 0.0 }
                }
                {
                    type    = builtin
                    name    = gain_norm_right
                    label   = linear
                    control = { "Mult" = 0.25 "Add" = 0.0 }
                }
                {
                    type    = builtin
                    name    = gain_norm_sub1
                    label   = linear
                    control = { "Mult" = 0.25 "Add" = 0.0 }
                }
                {
                    type    = builtin
                    name    = gain_norm_sub2
                    label   = linear
                    control = { "Mult" = 0.25 "Add" = 0.0 }
                }
                # Passthrough nodes for HP/IEM channels (4-7).
                # These consume the input but their outputs are not routed
                # to the playback side — dead-end in local-demo simulation.
                {
                    type  = builtin
                    name  = pass_hp_l
                    label = copy
                }
                {
                    type  = builtin
                    name  = pass_hp_r
                    label = copy
                }
                {
                    type  = builtin
                    name  = pass_iem_l
                    label = copy
                }
                {
                    type  = builtin
                    name  = pass_iem_r
                    label = copy
                }
            ]

            links = [
                { output = "room_conv_left:Out"  input = "gain_norm_left:In" }
                { output = "room_conv_right:Out" input = "gain_norm_right:In" }
                { output = "room_conv_sub1:Out"  input = "gain_norm_sub1:In" }
                { output = "room_conv_sub2:Out"  input = "gain_norm_sub2:In" }
            ]

            inputs  = [
                "room_conv_left:In"     # AUX0 = left main speaker
                "room_conv_right:In"    # AUX1 = right main speaker
                "room_conv_sub1:In"     # AUX2 = subwoofer 1
                "room_conv_sub2:In"     # AUX3 = subwoofer 2
                "pass_hp_l:In"          # AUX4 = engineer HP L (dead-end)
                "pass_hp_r:In"          # AUX5 = engineer HP R (dead-end)
                "pass_iem_l:In"         # AUX6 = singer IEM L (dead-end)
                "pass_iem_r:In"         # AUX7 = singer IEM R (dead-end)
            ]
            outputs = [
                "gain_norm_left:Out"
                "gain_norm_right:Out"
                "gain_norm_sub1:Out"
                "gain_norm_sub2:Out"
            ]
        }

        capture.props = {
            node.name                      = "alsa_output.usb-MiniDSP_USBStreamer-local-demo"
            node.description               = "USBStreamer Room Simulator (local-demo)"
            media.class                    = Audio/Sink
            audio.channels                 = 8
            audio.rate                     = 48000
            audio.position                 = [ AUX0 AUX1 AUX2 AUX3 AUX4 AUX5 AUX6 AUX7 ]
            node.autoconnect               = false
            node.always-process            = true
            session.suspend-timeout-seconds = 0
            node.pause-on-idle             = false
        }

        playback.props = {
            node.name                      = "pi4audio-room-sim-out"
            node.description               = "Room Simulator Output (4ch, local-demo)"
            node.passive                   = true
            audio.channels                 = 4
            audio.position                 = [ AUX0 AUX1 AUX2 AUX3 ]
            node.autoconnect               = false
            session.suspend-timeout-seconds = 0
            node.pause-on-idle             = false
        }
    }
}
]
