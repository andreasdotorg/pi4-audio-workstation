# Room simulator filter-chain for local-demo measurement E2E testing.
#
# A 4-channel PipeWire filter-chain that applies per-channel synthetic room
# impulse responses between the speaker convolver outputs and the UMIK-1
# loopback sink. This gives the measurement pipeline a realistic per-channel
# room response without any special code paths or env var scaffolding.
#
# Signal flow in measurement mode (US-111):
#   pi4audio-convolver-out:output_AUX0 → pi4audio-room-sim:playback_AUX0 → room_conv_left  → gain_norm_left  (0.25) → output_AUX0 ─┐
#   pi4audio-convolver-out:output_AUX1 → pi4audio-room-sim:playback_AUX1 → room_conv_right → gain_norm_right (0.25) → output_AUX1 ─┤→ PW native sum at umik1-loopback-sink:playback_FL
#   pi4audio-convolver-out:output_AUX2 → pi4audio-room-sim:playback_AUX2 → room_conv_sub1  → gain_norm_sub1  (0.25) → output_AUX2 ─┤
#   pi4audio-convolver-out:output_AUX3 → pi4audio-room-sim:playback_AUX3 → room_conv_sub2  → gain_norm_sub2  (0.25) → output_AUX3 ─┘
#
# Each channel has a physically distinct room IR (different speaker position →
# different propagation delay, early reflections, LF room mode coupling).
# The per-channel gain (Mult=0.25, -12 dB) normalizes the 4-channel sum at the
# UMIK-1 loopback port to match the old single-channel room sim level (~0.2 peak).
#
# Summation happens at the GM link level: GM links all 4 output ports to the
# single UMIK-1 loopback sink port. PipeWire natively sums multiple inputs
# connected to the same port (same principle as sub mono-summing in production).
#
# On production Pi (real mic, real room), this node does not exist.
# GM's optional links are silently skipped by the reconciler.
#
# Injected by local-demo.sh into the PW config directory.

context.modules = [
{
    name = libpipewire-module-filter-chain
    args = {
        node.description = "Room Simulator (4ch, local-demo)"
        media.name       = "pi4audio Room Simulator"

        filter.graph = {
            nodes = [
                # Per-channel room IR convolvers.
                {
                    type   = builtin
                    name   = room_conv_left
                    label  = convolver
                    config = {
                        filename = "COEFFS_DIR/room_ir_left.wav"
                    }
                }
                {
                    type   = builtin
                    name   = room_conv_right
                    label  = convolver
                    config = {
                        filename = "COEFFS_DIR/room_ir_right.wav"
                    }
                }
                {
                    type   = builtin
                    name   = room_conv_sub1
                    label  = convolver
                    config = {
                        filename = "COEFFS_DIR/room_ir_sub1.wav"
                    }
                }
                {
                    type   = builtin
                    name   = room_conv_sub2
                    label  = convolver
                    config = {
                        filename = "COEFFS_DIR/room_ir_sub2.wav"
                    }
                }
                # Per-channel gain normalization (Mult=0.25 = -12 dB).
                # When PW sums all 4 outputs at the loopback sink port,
                # the total level matches the old single-channel sim (~0.2 peak).
                {
                    type    = builtin
                    name    = gain_norm_left
                    label   = linear
                    control = { "Mult" = 0.25 "Add" = 0.0 }
                }
                {
                    type    = builtin
                    name    = gain_norm_right
                    label   = linear
                    control = { "Mult" = 0.25 "Add" = 0.0 }
                }
                {
                    type    = builtin
                    name    = gain_norm_sub1
                    label   = linear
                    control = { "Mult" = 0.25 "Add" = 0.0 }
                }
                {
                    type    = builtin
                    name    = gain_norm_sub2
                    label   = linear
                    control = { "Mult" = 0.25 "Add" = 0.0 }
                }
            ]

            links = [
                { output = "room_conv_left:Out"  input = "gain_norm_left:In" }
                { output = "room_conv_right:Out" input = "gain_norm_right:In" }
                { output = "room_conv_sub1:Out"  input = "gain_norm_sub1:In" }
                { output = "room_conv_sub2:Out"  input = "gain_norm_sub2:In" }
            ]

            inputs  = [
                "room_conv_left:In"
                "room_conv_right:In"
                "room_conv_sub1:In"
                "room_conv_sub2:In"
            ]
            outputs = [
                "gain_norm_left:Out"
                "gain_norm_right:Out"
                "gain_norm_sub1:Out"
                "gain_norm_sub2:Out"
            ]
        }

        capture.props = {
            node.name                      = "pi4audio-room-sim"
            node.description               = "Room Simulator Input (4ch, local-demo)"
            media.class                    = Audio/Sink
            audio.channels                 = 4
            audio.position                 = [ AUX0 AUX1 AUX2 AUX3 ]
            node.autoconnect               = false
            node.always-process            = true
            session.suspend-timeout-seconds = 0
            node.pause-on-idle             = false
        }

        playback.props = {
            node.name                      = "pi4audio-room-sim-out"
            node.description               = "Room Simulator Output (4ch, local-demo)"
            node.passive                   = true
            audio.channels                 = 4
            audio.position                 = [ AUX0 AUX1 AUX2 AUX3 ]
            node.autoconnect               = false
            session.suspend-timeout-seconds = 0
            node.pause-on-idle             = false
        }
    }
}
]
