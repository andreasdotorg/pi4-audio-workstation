# PA with ported subs — placeholder for future configuration
# Same topology as 2way-80hz-sealed but with ported sub enclosures.
# Identity files for the ported subs do not exist yet.

name: "PA 2-Way 80Hz Ported"
description: "PA configuration with self-built wideband mains and ported subwoofers. PLACEHOLDER — ported sub identity not yet defined."
topology: 2way

crossover:
  frequency_hz: 80
  slope_db_per_oct: 48
  type: linkwitz-riley

speakers:
  sat_left:
    identity: wideband-selfbuilt-v1
    role: satellite
    channel: 0
    filter_type: highpass
    polarity: normal
  sat_right:
    identity: wideband-selfbuilt-v1
    role: satellite
    channel: 1
    filter_type: highpass
    polarity: normal
  sub1:
    identity: sub-ported-15
    role: subwoofer
    channel: 2
    filter_type: lowpass
    polarity: normal
  sub2:
    identity: sub-ported-15
    role: subwoofer
    channel: 3
    filter_type: lowpass
    polarity: normal

monitoring:
  hp_left: 4
  hp_right: 5
  hp2_left: 6
  hp2_right: 7

gain_staging:
  satellite:
    headroom_db: -7.0
    power_limit_db: -24.0
  subwoofer:
    headroom_db: -7.0
    power_limit_db: -24.0

target_curve: flat
filter_taps: 16384
