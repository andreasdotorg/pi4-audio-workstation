# Workshop venue — XRK-10F monitors as full-range PA (no sub)
# Owner decision: no own sub for workshop venue. XRK-10F runs full-range
# with subsonic HPF at 40 Hz (from identity mandatory_hpf_hz) + room
# correction FIR only. No sub/main crossover.
#
# Internal passive crossover at ~2 kHz between 22W woofer and 10F tweeter
# is handled within each XRK-10F cabinet. Mugge sees it as a single
# full-range output per cabinet.
#
# AMP CONSTRAINT: 2 speaker channels on owner's 4-channel Class D amp
# (4x450W). Channels 2-3 unused (no subs). Full monitoring + IEM available.
#
# Channel mapping (USBStreamer AUX0-AUX7):
#   AUX0 = Left XRK-10F   (full-range, HPF 40 Hz + room correction)
#   AUX1 = Right XRK-10F  (full-range, HPF 40 Hz + room correction)
#   AUX2 = (unused)
#   AUX3 = (unused)
#   AUX4 = HP Left          (monitoring)
#   AUX5 = HP Right         (monitoring)
#   AUX6 = IEM Left         (singer IEM — available in this topology)
#   AUX7 = IEM Right        (singer IEM — available in this topology)
#
# LIMITATION: No sub-bass below ~50 Hz. The 22W woofer in a sealed ~15L
# cabinet has F3 around 50 Hz. Psytrance sub-bass will be absent.
# Acceptable for workshop/rehearsal use, not for PA gigs.
#
# SAFETY: 10F driver rated 10W only! Thermal protection (US-092) mandatory.
# The 450W amp channel MUST be gain-limited. power_limit_db is set
# conservatively to keep amp output below 10W into 8 ohms.

name: "Workshop XRK-10F Full-Range"
description: "XRK-10F monitors full-range for workshop venue (~70 sqm). No sub — no bass below ~50 Hz. HPF 40 Hz + room correction via mugge FIR."
topology: 2way

# Subsonic HPF only — no sub/main split. The crossover frequency acts as
# the HPF cutoff. With no sub entries, only highpass filters are generated.
crossover:
  frequency_hz: 40
  slope_db_per_oct: 48
  type: linkwitz-riley

speakers:
  sat_left:
    identity: xrk10f-monitor
    role: fullrange
    channel: 0
    filter_type: fullrange
    polarity: normal
  sat_right:
    identity: xrk10f-monitor
    role: fullrange
    channel: 1
    filter_type: fullrange
    polarity: normal

monitoring:
  hp_left: 4
  hp_right: 5
  hp2_left: 6
  hp2_right: 7

gain_staging:
  satellite:
    headroom_db: -10.0
    power_limit_db: -18.0  # CRITICAL: 10F rated 10W. 450W amp at -18dB ~ 7W. Do not increase.

target_curve: flat
filter_taps: 16384
