# Bose Jewel Double Cube — satellite speaker
# Small full-range satellite from Bose Acoustimass / Lifestyle systems.
# Needs baffle step compensation (+4dB) and highpass protection.

name: "Bose Jewel Double Cube"
manufacturer: "Bose"
model: "Jewel Double Cube"
type: sealed

impedance_ohm: 8
