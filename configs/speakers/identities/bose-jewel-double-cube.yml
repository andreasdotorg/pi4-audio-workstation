# Bose Jewel Double Cube — satellite speaker
# Small full-range satellite from Bose Acoustimass / Lifestyle systems.
# Sealed enclosure, single small driver (~2-2.5 inch).
#
# Measured near-field response (2026-03-11, UMIK-1 at 1-2cm):
# - Passband peak: ~340-400Hz
# - Usable bandwidth: ~200Hz to 6kHz (-15dB vs peak)
# - Sweet spot: 300-600Hz (3dB variation)
# - HF rolloff: ~3dB/oct 400Hz-2kHz, ~8dB/oct above 4kHz
# - Effectively dead above 12kHz
# - Natural acoustic rolloff below 200Hz limits crossover integration
#
# This is a midrange-focused driver, not a full-range speaker.
# Treble correction beyond ~1kHz is not feasible under D-009 cut-only.
# Path A (accepted): defer corrections until listening-position measurement.

name: "Bose Jewel Double Cube"
manufacturer: "Bose"
model: "Jewel Double Cube"
driver: bose-jewel-double-cube
type: sealed

impedance_ohm: 8
sensitivity_db_spl: 83  # TODO(owner): Estimate for Bose Jewel Double Cube (~2" driver). Verify from spec sheet.

# D-029 gain staging
max_boost_db: 4
mandatory_hpf_hz: 200  # Changed from 155Hz based on measured driver response (2026-03-11)

# Power handling
max_power_watts: 20
power_limit_note: "Small drivers; keep power under 20W to avoid thermal damage."

# Measured acoustic bandwidth (near-field, 2026-03-11)
acoustic_bandwidth_hz: [200, 6000]

# Compensation EQ — deferred until listening-position measurement (Path A)
compensation_eq: []
