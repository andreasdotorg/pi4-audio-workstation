# Bose PS28 III — Home/Office Configuration (CHN-50P satellites)
# Speaker: Markaudio CHN-50P sealed box satellites + PS28 III isobaric sub
# Amp: McGrey PA4504 (4x450W @ 4 ohm)
# DAC: Behringer ADA8200 via USBStreamer
#
# Channel assignment:
#   0: Satellite L (CHN-50P sealed 1.16L, 4 ohm)
#   1: Satellite R (CHN-50P sealed 1.16L, 4 ohm)
#   2: Sub driver 1 (5.25" isobaric, 2.33 ohm, normal polarity)
#   3: Sub driver 2 (5.25" isobaric, 2.33 ohm, INVERTED — clamshell)
#   4: HP L (engineer headphone)
#   5: HP R (engineer headphone)
#   6: HP2 L / loopback (during testing)
#   7: HP2 R / loopback (during testing)
#
# Gain staging (D-029 compliant):
#   Global attenuation applied first, then per-channel headroom + power limit.
#   Amp sensitivity: 1.0V (+2.2 dBu).
#
#   Global: -10.5dB (D-029: max_boost across all identities + 0.5)
#   Satellite: -10.5 global -> -7dB headroom -> FIR (no boost) -> -22dB power limit
#     CHN-50P: 7W thermal limit.
#   Sub: -10.5 global -> -13dB headroom -> FIR (up to +10dB) -> -22dB power limit
#     Bose PS28 III: 62W thermal limit (after boost).
#
# CAUTION: Sub driver 2 (ch 3) is phase-inverted for isobaric clamshell.
# Do NOT use this config with other speaker systems.
#
# Filter coefficients contain crossover + subsonic protection (no room correction yet).
# After REW measurement, regenerate with room correction + speaker EQ baked in.

devices:
  samplerate: 48000
  chunksize: 256
  queuelimit: 4
  capture:
    type: Alsa
    channels: 8
    device: "hw:Loopback,1,0"
    format: S32LE
  playback:
    type: Alsa
    channels: 8
    device: "hw:USBStreamer,0"
    format: S32LE

mixers:
  route_bose_home:
    channels:
      in: 8
      out: 8
    mapping:
      # Satellite L (input ch 0) -> dest 0
      - dest: 0
        sources:
          - channel: 0
            gain: 0
            inverted: false
      # Satellite R (input ch 1) -> dest 1
      - dest: 1
        sources:
          - channel: 1
            gain: 0
            inverted: false
      # Mono sum L+R -> Sub driver 1 (dest 2, normal polarity)
      - dest: 2
        sources:
          - channel: 0
            gain: -6
          - channel: 1
            gain: -6
      # Mono sum L+R -> Sub driver 2 (dest 3, INVERTED for isobaric clamshell)
      - dest: 3
        sources:
          - channel: 0
            gain: -6
            inverted: true
          - channel: 1
            gain: -6
            inverted: true
      # HP L: Mixxx cue L (ch 2) + Reaper HP L (ch 4)
      - dest: 4
        sources:
          - channel: 2
            gain: 0
            inverted: false
          - channel: 4
            gain: 0
            inverted: false
      # HP R: Mixxx cue R (ch 3) + Reaper HP R (ch 5)
      - dest: 5
        sources:
          - channel: 3
            gain: 0
            inverted: false
          - channel: 5
            gain: 0
            inverted: false
      # HP2 L / loopback (input ch 6) -> dest 6
      - dest: 6
        sources:
          - channel: 6
            gain: 0
            inverted: false
      # HP2 R / loopback (input ch 7) -> dest 7
      - dest: 7
        sources:
          - channel: 7
            gain: 0
            inverted: false

filters:
  # --- Global attenuation (D-029) ---
  # Applied to all output channels before per-channel processing.
  # D-029: max_boost across all identities + 0.5dB safety margin.
  global_attenuation:
    type: Gain
    parameters:
      gain: -10.5

  # --- Headroom reservation (pre-FIR) ---
  # Creates digital headroom for FIR boost (D-029 mechanism).
  sat_headroom:
    type: Gain
    parameters:
      gain: -7.0
  sub_headroom:
    type: Gain
    parameters:
      gain: -13.0

  # --- Speaker trim (power protection) ---
  # Limits power delivered to drivers after headroom reservation.
  sat_speaker_trim:
    type: Gain
    parameters:
      gain: -22.0
  sub_speaker_trim:
    type: Gain
    parameters:
      gain: -22.0

  # --- Subsonic HPF (satellite protection) ---
  # ButterworthHighpass at 80Hz, order 4 (24dB/oct).
  # Protects CHN-50P from excursion below crossover region.
  # mandatory_hpf_hz = 80Hz per identity file.
  sat_hpf:
    type: BiquadCombo
    parameters:
      type: ButterworthHighpass
      freq: 80
      order: 4

  # --- Subsonic HPF (subwoofer protection) ---
  # ButterworthHighpass at 42Hz, order 4 (24dB/oct).
  # Protects PS28 III from excursion below port tuning.
  # mandatory_hpf_hz = 42Hz per identity file.
  sub_hpf:
    type: BiquadCombo
    parameters:
      type: ButterworthHighpass
      freq: 42
      order: 4

  # --- FIR convolution (crossover-only, no room correction yet) ---
  # Combined minimum-phase FIR filters:
  #   Satellite: HP crossover at 200Hz, 48dB/oct
  #   Sub: LP crossover at 200Hz, 48dB/oct + subsonic HPF at 42Hz, 48dB/oct
  # After REW measurement, regenerate with room correction + speaker EQ baked in.
  sat_left_fir:
    type: Conv
    parameters:
      type: Wav
      filename: "/etc/camilladsp/coeffs/combined_left_hp.wav"
  sat_right_fir:
    type: Conv
    parameters:
      type: Wav
      filename: "/etc/camilladsp/coeffs/combined_right_hp.wav"
  sub1_fir:
    type: Conv
    parameters:
      type: Wav
      filename: "/etc/camilladsp/coeffs/combined_sub1_lp.wav"
  sub2_fir:
    type: Conv
    parameters:
      type: Wav
      filename: "/etc/camilladsp/coeffs/combined_sub2_lp.wav"

pipeline:
  # 1. Route stereo input to 8 output channels
  - type: Mixer
    name: route_bose_home
  # 2. Global attenuation (D-029, all speaker channels)
  - type: Filter
    channels: [0, 1, 2, 3]
    names:
      - global_attenuation
  # 3. Headroom reservation (before FIR)
  - type: Filter
    channels: [0, 1]
    names:
      - sat_headroom
  - type: Filter
    channels: [2, 3]
    names:
      - sub_headroom
  # 4. Subsonic HPFs (before FIR)
  - type: Filter
    channels: [0, 1]
    names:
      - sat_hpf
  # Sub subsonic HPF (42Hz, order 4)
  - type: Filter
    channels: [2, 3]
    names:
      - sub_hpf
  # 5. FIR convolution (crossover + room correction + speaker EQ)
  - type: Filter
    channels: [0]
    names:
      - sat_left_fir
  - type: Filter
    channels: [1]
    names:
      - sat_right_fir
  - type: Filter
    channels: [2]
    names:
      - sub1_fir
  - type: Filter
    channels: [3]
    names:
      - sub2_fir
  # 6. Speaker trim / power limiting (after FIR, protects drivers)
  - type: Filter
    channels: [0, 1]
    names:
      - sat_speaker_trim
  - type: Filter
    channels: [2, 3]
    names:
      - sub_speaker_trim
