# 80-jack-no-autoconnect.conf — Suppress JACK client auto-connect.
#
# Prevents JACK applications (Mixxx, Reaper) from auto-connecting their
# ports to hardware sinks on startup.  All routing is managed by the
# routing scripts (pi4audio-dj-routing, pi4audio-live-routing).
#
# Pi destination: ~/.config/pipewire/jack.conf.d/80-jack-no-autoconnect.conf

jack.rules = [
  {
    matches = [
      {
        # Match all JACK clients — routing is always script-managed.
        application.process.binary = "~.*"
      }
    ]
    actions = {
      update-props = {
        node.autoconnect = false
      }
    }
  }
]
