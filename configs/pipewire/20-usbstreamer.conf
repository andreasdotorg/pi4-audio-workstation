# PipeWire static adapter for ADA8200 inputs via USBStreamer (capture only).
# Opens ONLY the capture direction (split ALSA substream access).
#
# node.group groups this capture adapter with the USBStreamer playback
# adapter (21-usbstreamer-playback.conf) so PipeWire schedules them on
# the same graph cycle — required because they share the same ADAT link
# (C-005 Finding 13 / TK-250).
context.objects = [
    {   factory = adapter
        args = {
            factory.name     = api.alsa.pcm.source
            node.name        = "ada8200-in"
            node.description = "ADA8200 8ch Input"
            media.class      = "Audio/Source"
            api.alsa.path    = "hw:USBStreamer,0"
            audio.format     = "S32LE"
            audio.rate       = 48000
            audio.channels   = 8
            audio.position   = [ AUX0 AUX1 AUX2 AUX3 AUX4 AUX5 AUX6 AUX7 ]
            api.alsa.period-size   = 1024
            api.alsa.period-num    = 3
            api.alsa.disable-batch = true
            node.group             = pi4audio.usbstreamer
            node.driver            = false
            priority.driver        = 0
            priority.session       = 0
            node.pause-on-idle     = false
            session.suspend-timeout-seconds = 0
        }
    }
]
