# PipeWire static adapter for ADA8200 inputs via USBStreamer (capture only)
# CamillaDSP holds USBStreamer playback (hw:USBStreamer,0) exclusively.
# This node opens ONLY the capture direction — verified compatible with
# CamillaDSP's exclusive playback (split ALSA substream access).
context.objects = [
    {   factory = adapter
        args = {
            factory.name     = api.alsa.pcm.source
            node.name        = "ada8200-in"
            node.description = "ADA8200 8ch Input"
            media.class      = "Audio/Source"
            api.alsa.path    = "hw:USBStreamer,0"
            audio.format     = "S32LE"
            audio.rate       = 48000
            audio.channels   = 8
            audio.position   = [ AUX0 AUX1 AUX2 AUX3 AUX4 AUX5 AUX6 AUX7 ]
            api.alsa.period-size   = 256
            api.alsa.period-num    = 2
            api.alsa.disable-batch = true
            node.driver            = false
            priority.driver        = 0
            priority.session       = 0
            node.pause-on-idle     = false
            session.suspend-timeout-seconds = 0
        }
    }
]
