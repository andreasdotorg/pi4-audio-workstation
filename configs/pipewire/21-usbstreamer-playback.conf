# PipeWire static adapter for USBStreamer playback (8ch output).
# Created for GM-12 DJ stability test — routes PW filter-chain
# convolver output to USBStreamer hardware.
#
# When CamillaDSP is stopped, PipeWire takes over the playback
# direction of the USBStreamer ALSA device.
#
# Node name matches GraphManager's USBSTREAMER_OUT_PREFIX for
# link matching (NodeMatch::Prefix).
context.objects = [
    {   factory = adapter
        args = {
            factory.name     = api.alsa.pcm.sink
            node.name        = "alsa_output.usb-MiniDSP_USBStreamer-00.pro-output-0"
            node.description = "USBStreamer 8ch Output"
            media.class      = "Audio/Sink"
            api.alsa.path    = "hw:USBStreamer,0"
            audio.format     = "S32LE"
            audio.rate       = 48000
            audio.channels   = 8
            audio.position   = [ AUX0 AUX1 AUX2 AUX3 AUX4 AUX5 AUX6 AUX7 ]
            api.alsa.period-size   = 1024
            api.alsa.period-num    = 4
            api.alsa.disable-batch = true
            node.autoconnect       = false
            node.driver            = true
            node.group             = pi4audio.usbstreamer
            priority.driver        = 2000
            priority.session       = 2000
            node.pause-on-idle     = false
            session.suspend-timeout-seconds = 0
        }
    }
]
