# PipeWire filter-chain drop-in: 4-channel FIR convolver (US-059).
#
# Replaces CamillaDSP's convolution stage with PipeWire's built-in
# convolver module.  Handles ONLY convolution -- all routing (mono
# summing for subs, HP/IEM passthrough, USBStreamer linking) is
# managed by GraphManager via PW links.
#
# Channel assignment:
#   AUX0 = Left wideband main  (highpass + room correction)
#   AUX1 = Right wideband main (highpass + room correction)
#   AUX2 = Subwoofer 1         (lowpass + room correction)
#   AUX3 = Subwoofer 2         (lowpass + room correction)
#
# Channels 4-7 (engineer HP, singer IEM) bypass the filter-chain
# entirely -- GraphManager links them directly from app to USBStreamer.
#
# Gain staging:
#   WAV coefficients contain crossover + correction + speaker trim (-24 dB
#   for mains, -6 dB mono sum comp + -24 dB trim for subs).
#   All coefficients verified <= -0.5 dB peak per D-009.
#
#   PW 1.4.9 builtin convolver silently ignores config.gain (Finding 4,
#   GM-12).  Attenuation is applied via linear builtin nodes chained
#   after each convolver: y = x * Mult + 0.0 (flat gain).
#   Current per-channel values (C-005 Finding 7, thermal safety):
#     Mains (left_hp, right_hp): Mult = 0.001  (-60 dB)
#     Subs  (sub1_lp, sub2_lp):  Mult = 0.000631 (-64 dB)
#   Persistent across PW restarts, adjustable per-channel via pw-cli,
#   does not modify the original FIR coefficient WAV files.
#
# FFT engine: FFTW3 single-precision with ARM NEON (libfftw3f.so.3).
# BM-2 benchmark: 1.70% CPU at quantum 1024, 3.47% at quantum 256.
#
# Node names (GraphManager matches on these):
#   Capture:  pi4audio-convolver      (Audio/Sink, receives 4ch from app)
#   Playback: pi4audio-convolver-out  (source, feeds USBStreamer ch 0-3)
#
# Deploy to: ~/.config/pipewire/pipewire.conf.d/30-filter-chain-convolver.conf
# Loaded by the system PipeWire instance -- no infrastructure modules needed.

context.modules = [
{
    name = libpipewire-module-filter-chain
    args = {
        node.description = "FIR Convolver (4ch x 16k taps)"
        media.name       = "pi4audio FIR Convolver"

        filter.graph = {
            nodes = [
                {
                    type   = builtin
                    name   = conv_left_hp
                    label  = convolver
                    config = {
                        filename = "/etc/pi4audio/coeffs/combined_left_hp.wav"
                        # config.gain removed: PW 1.4.9 silently ignores it
                        # (Finding 4, GM-12). Attenuation via linear nodes below.
                    }
                }
                {
                    type   = builtin
                    name   = conv_right_hp
                    label  = convolver
                    config = {
                        filename = "/etc/pi4audio/coeffs/combined_right_hp.wav"
                    }
                }
                {
                    type   = builtin
                    name   = conv_sub1_lp
                    label  = convolver
                    config = {
                        filename = "/etc/pi4audio/coeffs/combined_sub1_lp.wav"
                    }
                }
                {
                    type   = builtin
                    name   = conv_sub2_lp
                    label  = convolver
                    config = {
                        filename = "/etc/pi4audio/coeffs/combined_sub2_lp.wav"
                    }
                }
                # Linear gain nodes: y = x * Mult + Add
                # 0.0316 = 10^(-30/20) = -30 dB flat attenuation.
                # Workaround for PW 1.4.9 ignoring convolver config.gain.
                {
                    type    = builtin
                    name    = gain_left_hp
                    label   = linear
                    control = { "Mult" = 0.001 "Add" = 0.0 }
                }
                {
                    type    = builtin
                    name    = gain_right_hp
                    label   = linear
                    control = { "Mult" = 0.001 "Add" = 0.0 }
                }
                {
                    type    = builtin
                    name    = gain_sub1_lp
                    label   = linear
                    control = { "Mult" = 0.000631 "Add" = 0.0 }
                }
                {
                    type    = builtin
                    name    = gain_sub2_lp
                    label   = linear
                    control = { "Mult" = 0.000631 "Add" = 0.0 }
                }
            ]

            links = [
                { output = "conv_left_hp:Out"  input = "gain_left_hp:In" }
                { output = "conv_right_hp:Out" input = "gain_right_hp:In" }
                { output = "conv_sub1_lp:Out"  input = "gain_sub1_lp:In" }
                { output = "conv_sub2_lp:Out"  input = "gain_sub2_lp:In" }
            ]

            inputs  = [
                "conv_left_hp:In"
                "conv_right_hp:In"
                "conv_sub1_lp:In"
                "conv_sub2_lp:In"
            ]
            outputs = [
                "gain_left_hp:Out"
                "gain_right_hp:Out"
                "gain_sub1_lp:Out"
                "gain_sub2_lp:Out"
            ]
        }

        capture.props = {
            node.name                       = "pi4audio-convolver"
            node.description                = "FIR Convolver (4ch)"
            media.class                     = Audio/Sink
            audio.channels                  = 4
            audio.position                  = [ AUX0 AUX1 AUX2 AUX3 ]
            # Prevent session manager auto-routing -- GraphManager
            # creates all links explicitly.
            node.autoconnect                = false
            session.suspend-timeout-seconds = 0
            node.pause-on-idle              = false
        }

        playback.props = {
            node.name                       = "pi4audio-convolver-out"
            node.description                = "FIR Convolver Output"
            node.passive                    = true
            audio.channels                  = 4
            audio.position                  = [ AUX0 AUX1 AUX2 AUX3 ]
            node.autoconnect                = false
            session.suspend-timeout-seconds = 0
            node.pause-on-idle              = false
        }
    }
}
]
