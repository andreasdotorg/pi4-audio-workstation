# PipeWire filter-chain drop-in: 8-channel FIR convolver (D-063, US-115).
#
# All 8 USBStreamer output channels route through the filter-chain convolver.
# Channels that do not require crossover or room correction (headphones, IEM)
# use Dirac (identity) coefficients for passthrough.  This eliminates bypass
# links entirely -- GraphManager uses a single uniform routing pattern.
#
# Channel assignment:
#   AUX0 = Left wideband main  (highpass + room correction)
#   AUX1 = Right wideband main (highpass + room correction)
#   AUX2 = Subwoofer 1         (lowpass + room correction)
#   AUX3 = Subwoofer 2         (lowpass + room correction)
#   AUX4 = Engineer headphone L (Dirac passthrough)
#   AUX5 = Engineer headphone R (Dirac passthrough)
#   AUX6 = Singer IEM L         (Dirac passthrough)
#   AUX7 = Singer IEM R         (Dirac passthrough)
#
# Gain staging:
#   WAV coefficients contain crossover + correction + speaker trim (-24 dB
#   for mains, -6 dB mono sum comp + -24 dB trim for subs).
#   All coefficients verified <= -0.5 dB peak per D-009.
#
#   PW 1.4.9 builtin convolver silently ignores config.gain (Finding 4,
#   GM-12).  Attenuation is applied via linear builtin nodes chained
#   after each convolver: y = x * Mult + 0.0 (flat gain).
#
#   D-063 universal audio gate: ALL 8 Mult defaults are 0.0 (muted).
#   No audio flows until the operator explicitly opens the gate via
#   the ramp-up sequence.  Operational gain values are set at runtime
#   via pw-cli and are session-only (C-009).
#
# FFT engine: FFTW3 single-precision with ARM NEON (libfftw3f.so.3).
# BM-2 benchmark: 1.70% CPU at quantum 1024, 3.47% at quantum 256.
# 8ch estimated: ~3.4% at quantum 1024 (4 additional 16384-tap Dirac).
#
# Node names (GraphManager matches on these):
#   Capture:  pi4audio-convolver      (Audio/Sink, receives 8ch from app)
#   Playback: pi4audio-convolver-out  (source, feeds USBStreamer ch 0-7)
#
# Deploy to: ~/.config/pipewire/pipewire.conf.d/30-filter-chain-convolver.conf
# Loaded by the system PipeWire instance -- no infrastructure modules needed.

context.modules = [
{
    name = libpipewire-module-filter-chain
    args = {
        node.description = "FIR Convolver (8ch x 16k taps)"
        media.name       = "pi4audio FIR Convolver"

        filter.graph = {
            nodes = [
                # Speaker channels (0-3): crossover + room correction FIR
                {
                    type   = builtin
                    name   = conv_left_hp
                    label  = convolver
                    config = {
                        filename = "/etc/pi4audio/coeffs/combined_left_hp.wav"
                    }
                }
                {
                    type   = builtin
                    name   = conv_right_hp
                    label  = convolver
                    config = {
                        filename = "/etc/pi4audio/coeffs/combined_right_hp.wav"
                    }
                }
                {
                    type   = builtin
                    name   = conv_sub1_lp
                    label  = convolver
                    config = {
                        filename = "/etc/pi4audio/coeffs/combined_sub1_lp.wav"
                    }
                }
                {
                    type   = builtin
                    name   = conv_sub2_lp
                    label  = convolver
                    config = {
                        filename = "/etc/pi4audio/coeffs/combined_sub2_lp.wav"
                    }
                }
                # Monitoring channels (4-7): Dirac passthrough (identity)
                {
                    type   = builtin
                    name   = conv_hp_l
                    label  = convolver
                    config = {
                        filename = "/etc/pi4audio/coeffs/dirac.wav"
                    }
                }
                {
                    type   = builtin
                    name   = conv_hp_r
                    label  = convolver
                    config = {
                        filename = "/etc/pi4audio/coeffs/dirac.wav"
                    }
                }
                {
                    type   = builtin
                    name   = conv_iem_l
                    label  = convolver
                    config = {
                        filename = "/etc/pi4audio/coeffs/dirac.wav"
                    }
                }
                {
                    type   = builtin
                    name   = conv_iem_r
                    label  = convolver
                    config = {
                        filename = "/etc/pi4audio/coeffs/dirac.wav"
                    }
                }
                # Linear gain nodes: y = x * Mult + Add
                # D-063 universal audio gate: ALL Mult = 0.0 (muted at startup).
                # Operational gains set at runtime via pw-cli ramp-up sequence.
                {
                    type    = builtin
                    name    = gain_left_hp
                    label   = linear
                    control = { "Mult" = 0.0 "Add" = 0.0 }
                }
                {
                    type    = builtin
                    name    = gain_right_hp
                    label   = linear
                    control = { "Mult" = 0.0 "Add" = 0.0 }
                }
                {
                    type    = builtin
                    name    = gain_sub1_lp
                    label   = linear
                    control = { "Mult" = 0.0 "Add" = 0.0 }
                }
                {
                    type    = builtin
                    name    = gain_sub2_lp
                    label   = linear
                    control = { "Mult" = 0.0 "Add" = 0.0 }
                }
                {
                    type    = builtin
                    name    = gain_hp_l
                    label   = linear
                    control = { "Mult" = 0.0 "Add" = 0.0 }
                }
                {
                    type    = builtin
                    name    = gain_hp_r
                    label   = linear
                    control = { "Mult" = 0.0 "Add" = 0.0 }
                }
                {
                    type    = builtin
                    name    = gain_iem_l
                    label   = linear
                    control = { "Mult" = 0.0 "Add" = 0.0 }
                }
                {
                    type    = builtin
                    name    = gain_iem_r
                    label   = linear
                    control = { "Mult" = 0.0 "Add" = 0.0 }
                }
            ]

            links = [
                { output = "conv_left_hp:Out"  input = "gain_left_hp:In" }
                { output = "conv_right_hp:Out" input = "gain_right_hp:In" }
                { output = "conv_sub1_lp:Out"  input = "gain_sub1_lp:In" }
                { output = "conv_sub2_lp:Out"  input = "gain_sub2_lp:In" }
                { output = "conv_hp_l:Out"     input = "gain_hp_l:In" }
                { output = "conv_hp_r:Out"     input = "gain_hp_r:In" }
                { output = "conv_iem_l:Out"    input = "gain_iem_l:In" }
                { output = "conv_iem_r:Out"    input = "gain_iem_r:In" }
            ]

            inputs  = [
                "conv_left_hp:In"
                "conv_right_hp:In"
                "conv_sub1_lp:In"
                "conv_sub2_lp:In"
                "conv_hp_l:In"
                "conv_hp_r:In"
                "conv_iem_l:In"
                "conv_iem_r:In"
            ]
            outputs = [
                "gain_left_hp:Out"
                "gain_right_hp:Out"
                "gain_sub1_lp:Out"
                "gain_sub2_lp:Out"
                "gain_hp_l:Out"
                "gain_hp_r:Out"
                "gain_iem_l:Out"
                "gain_iem_r:Out"
            ]
        }

        capture.props = {
            node.name                       = "pi4audio-convolver"
            node.description                = "FIR Convolver (8ch)"
            media.class                     = Audio/Sink
            audio.channels                  = 8
            audio.position                  = [ AUX0 AUX1 AUX2 AUX3 AUX4 AUX5 AUX6 AUX7 ]
            # Prevent session manager auto-routing -- GraphManager
            # creates all links explicitly.
            node.autoconnect                = false
            session.suspend-timeout-seconds = 0
            node.pause-on-idle              = false
        }

        playback.props = {
            node.name                       = "pi4audio-convolver-out"
            node.description                = "FIR Convolver Output"
            node.passive                    = true
            audio.channels                  = 8
            audio.position                  = [ AUX0 AUX1 AUX2 AUX3 AUX4 AUX5 AUX6 AUX7 ]
            node.autoconnect                = false
            session.suspend-timeout-seconds = 0
            node.pause-on-idle              = false
        }
    }
}
]
