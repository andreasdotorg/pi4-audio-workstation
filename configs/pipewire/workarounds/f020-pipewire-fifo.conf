# F-020 Workaround: Force PipeWire to SCHED_FIFO 88 via systemd
#
# Problem: PipeWire's RT module (libspa-rt) is configured for rt.prio=88
# but fails to self-promote to SCHED_FIFO on the PREEMPT_RT kernel
# (6.12.62+rpt-rpi-v8-rt). It falls back to nice=-11 (SCHED_OTHER),
# causing audible glitches under CPU load. Manual `chrt -f -p 88 <pid>`
# after each start works, confirming the user has adequate rlimits
# (rtprio 95) and the kernel supports SCHED_FIFO for this user.
#
# Root cause: Unknown. Suspected interaction between PipeWire's RT module
# initialization and the PREEMPT_RT kernel's different timing/locking
# behavior. The RT module works on stock PREEMPT but not PREEMPT_RT.
# RTKit is installed and running but may behave differently on PREEMPT_RT.
#
# Fix: systemd CPUSchedulingPolicy=fifo in a drop-in override for the
# PipeWire user service. systemd sets the scheduling policy at exec time,
# before PipeWire starts -- bypassing the broken RT module self-promotion
# entirely. All threads forked by PipeWire inherit SCHED_FIFO from the
# main process.
#
# This is the same pattern used for CamillaDSP (F-018):
#   configs/systemd/camilladsp.service.d/override.conf
#
# Deployment:
#   mkdir -p ~/.config/systemd/user/pipewire.service.d/
#   cp f020-pipewire-fifo.conf ~/.config/systemd/user/pipewire.service.d/override.conf
#   systemctl --user daemon-reload
#   systemctl --user restart pipewire.service
#
# Verification:
#   # Check PipeWire main process scheduling:
#   chrt -p $(pgrep -x pipewire)
#   # Expected output: "current scheduling policy: SCHED_FIFO"
#   #                  "current scheduling priority: 88"
#
#   # Check PipeWire data thread (should inherit FIFO):
#   ps -eo pid,cls,rtprio,ni,comm | grep pipewire
#   # Expected: "FF" in CLS column, "88" in RTPRIO column
#
# Priority rationale:
#   88 = PipeWire (audio server, must preempt everything except kernel)
#   80 = CamillaDSP (DSP engine, preempted by PipeWire)
#   50 = IRQ threads (kernel default on PREEMPT_RT)
#   PipeWire at 88 > CamillaDSP at 80: correct. The audio server must
#   deliver buffers to clients on time; the DSP engine processes them.
#
# Removal: When PipeWire's RT module self-promotion is fixed upstream
# (or the root cause of F-020 is identified and resolved), remove this
# override and let the RT module manage scheduling natively.

[Service]
CPUSchedulingPolicy=fifo
CPUSchedulingPriority=88
