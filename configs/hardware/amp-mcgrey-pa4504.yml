# McGrey PA4504 — 4-channel Class D amplifier
# 4x450W @ 4 ohm, bridgeable.
#
# Voltage gain measured at full gain position.
# At 4 ohm: 450W -> V_out = sqrt(450*4) = 42.4V peak
# Input sensitivity: 1.0V for full output (+2.2 dBu)
# -> Voltage gain = 42.4V / 1.0V = 42.4x
#
# Used in: Bose home system (CHN-50P satellites + PS28 III subs)

name: "McGrey PA4504"
manufacturer: "McGrey"
model: "PA4504"
type: amplifier

specs:
  channels: 4
  max_output_power_watts: 450  # per channel @ 4 ohm
  nominal_impedance_ohm: 4
  voltage_gain: 42.4           # at full gain, dimensionless (V/V)
  input_sensitivity_vrms: 1.0  # for full output
  input_sensitivity_dbu: 2.2
