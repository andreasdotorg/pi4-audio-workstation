# 90-no-auto-link.conf — Suppress WirePlumber automatic link creation.
#
# Keep hardware.audio and policy.node active (required for adapter node
# port activation), but disable all automatic linking policies.
# All link creation is handled by the routing scripts (pi4audio-dj-routing,
# pi4audio-live-routing).
#
# WirePlumber 0.5.8 dict syntax — NOT the 0.4 array syntax.
#
# Pi destination: ~/.config/wireplumber/wireplumber.conf.d/90-no-auto-link.conf

wireplumber.profiles = {
  main = {
    policy.standard = disabled
    policy.linking.standard = disabled
    policy.linking.role-based = disabled
  }
}
