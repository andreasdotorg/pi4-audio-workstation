# T-044-2: Load the USBStreamer ALSA deny policy script.
#
# Adds a custom WirePlumber Lua script that blocks unauthorized nodes
# from targeting the USBStreamer ALSA device. Only PipeWire's own static
# adapters (ada8200-in, alsa_output.usb-MiniDSP_USBStreamer-00.pro-output-0) are allowed.
#
# WirePlumber 0.5.x custom script loading syntax.
#
# Pi destination: ~/.config/wireplumber/wireplumber.conf.d/53-deny-usbstreamer-alsa.conf
# Script:         ~/.config/wireplumber/scripts/deny-usbstreamer-alsa.lua

wireplumber.components = [
  {
    name = deny-usbstreamer-alsa.lua, type = script/lua
    provides = custom.deny-usbstreamer-alsa
  }
]

wireplumber.profiles = {
  main = {
    custom.deny-usbstreamer-alsa = required
  }
}
