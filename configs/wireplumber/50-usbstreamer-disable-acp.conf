# Disable WirePlumber ACP for USBStreamer — we create a static
# capture-only adapter in pipewire.conf.d/20-usbstreamer.conf instead.
# Without this, WirePlumber would create its own duplex nodes
# that conflict with CamillaDSP's exclusive playback access.
monitor.alsa.rules = [
  {
    matches = [
      { device.name = "~alsa_card.usb-miniDSP_USBStreamer*" }
    ]
    actions = {
      update-props = {
        device.disabled = true
      }
    }
  }
]
