# Venue config: production defaults.
#
# Speaker channels use the production gain values from C-005 Finding 7
# (thermal safety).  HP and IEM channels at unity gain (0 dB) with
# Dirac passthrough — no processing on monitoring channels.
#
# Coefficients for speaker channels reference the combined FIR files
# generated by the measurement pipeline.  These are overwritten per-venue
# by the room correction system.

name: "production"
description: "Production defaults — C-005 speaker gains, Dirac passthrough on monitoring"

channels:
  1_sat_l:
    gain_db: -60
    delay_ms: 0
    coefficients: "combined_left_hp.wav"
  2_sat_r:
    gain_db: -60
    delay_ms: 0
    coefficients: "combined_right_hp.wav"
  3_sub1_lp:
    gain_db: -64
    delay_ms: 0
    coefficients: "combined_sub1_lp.wav"
  4_sub2_lp:
    gain_db: -64
    delay_ms: 0
    coefficients: "combined_sub2_lp.wav"
  5_eng_l:
    gain_db: 0
    delay_ms: 0
    coefficients: "dirac.wav"
  6_eng_r:
    gain_db: 0
    delay_ms: 0
    coefficients: "dirac.wav"
  7_iem_l:
    gain_db: 0
    delay_ms: 0
    coefficients: "dirac.wav"
  8_iem_r:
    gain_db: 0
    delay_ms: 0
    coefficients: "dirac.wav"
