# Venue config: Markaudio CHN-50P mains + Dayton Ultimax UMII18-22 sub.
#
# 200Hz crossover, LR4-equivalent (24 dB/oct) minimum-phase FIR.
# Single sub on ch 3 (AUX2). Ch 4 (AUX3) is spare, permanently muted.
#
# Speaker profile: configs/speakers/profiles/2way-200hz-markaudio-ultimax.yml
# Sub identity: configs/speakers/identities/dayton-ultimax-umii18-22-sealed-120l.yml
# Sat identity: configs/speakers/identities/markaudio-chn-50p-sealed-1l16.yml
#
# Coefficients for speaker channels reference crossover-only FIR files
# generated by: scripts/generate-crossover-coeffs.py
# These are overwritten per-venue by the room correction pipeline after
# measurement. Until then, they provide crossover-only filtering (no
# room correction).
#
# Gain values:
#   Mains (-60 dB): production default from C-005 (thermal safety).
#   Sub (-64 dB): production default from C-005.
#   Spare (-120 dB): belt-and-suspenders mute per Architect guidance.
#     The D-063 audio gate (Mult=0.0) is the primary mute mechanism,
#     but -120 dB gain ensures the spare channel stays silent even if
#     the gate is accidentally opened.
#   HP/IEM (0 dB): unity gain, dirac passthrough.

name: "markaudio-ultimax-200hz"
description: "CHN-50P + Ultimax UMII18-22 at 200Hz -- crossover only, no room correction"

channels:
  1_sat_l:
    gain_db: -60
    delay_ms: 0
    coefficients: "combined_left_hp.wav"
  2_sat_r:
    gain_db: -60
    delay_ms: 0
    coefficients: "combined_right_hp.wav"
  3_sub1_lp:
    gain_db: -64
    delay_ms: 0
    coefficients: "combined_sub1_lp.wav"
  4_sub2_lp:
    gain_db: -120
    delay_ms: 0
    coefficients: "dirac.wav"
  5_eng_l:
    gain_db: 0
    delay_ms: 0
    coefficients: "dirac.wav"
  6_eng_r:
    gain_db: 0
    delay_ms: 0
    coefficients: "dirac.wav"
  7_iem_l:
    gain_db: 0
    delay_ms: 0
    coefficients: "dirac.wav"
  8_iem_r:
    gain_db: 0
    delay_ms: 0
    coefficients: "dirac.wav"
